<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Voćnjak">
<meta name="theme-color" content="#1a3320">
<title>Dnevnik Voćnjaka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #1a3320;
    --green-mid: #2d5a2d;
    --green-light: #4a8a4a;
    --green-pale: #e8f0e8;
    --cream: #f5f2eb;
    --cream-dark: #ede9df;
    --amber: #d97706;
    --amber-pale: #fef3c7;
    --red: #b91c1c;
    --red-pale: #fee2e2;
    --blue: #1d4ed8;
    --blue-pale: #dbeafe;
    --indigo: #4338ca;
    --indigo-pale: #e0e7ff;
    --text: #1c1a14;
    --text-mid: #4a4535;
    --text-light: #8a8070;
    --border: #ddd8cc;
    --white: #ffffff;
    --shadow: 0 2px 12px rgba(26,51,32,0.10);
    --shadow-lg: 0 8px 32px rgba(26,51,32,0.18);
    --r: 12px;
    --r-sm: 7px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── HEADER ── */
  .header {
    background: var(--green-deep);
    padding: calc(var(--safe-top) + 14px) 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.25);
  }
  .header-title { font-family: 'Playfair Display', serif; color: #fff; font-size: 20px; letter-spacing: 0.3px; }
  .header-sub { font-size: 10px; color: #7aad7a; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .today-badge {
    background: rgba(255,255,255,0.12);
    color: #c8e6c8;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }

  /* ── NAV TABS ── */
  .nav-tabs {
    display: flex;
    background: var(--green-mid);
    padding: 0 6px;
    gap: 2px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: transparent;
    border: none;
    color: #c8e6c8;
    padding: 9px 14px 7px;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.15s, color 0.15s;
    position: relative;
    flex-shrink: 0;
  }
  .tab-btn.active {
    background: var(--cream);
    color: var(--green-deep);
    font-weight: 700;
  }
  .tab-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: var(--white);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
    box-shadow: 0 -2px 16px rgba(0,0,0,0.08);
  }
  .bnav-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 10px 4px 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    color: var(--text-light);
    font-size: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: color 0.15s;
  }
  .bnav-btn.active { color: var(--green-mid); }
  .bnav-btn svg { width: 22px; height: 22px; }

  /* ── MAIN SCROLL AREA ── */
  .main {
    padding: 16px 16px calc(72px + var(--safe-bottom)) 16px;
    max-width: 520px;
    margin: 0 auto;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-light);
    font-weight: 500;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after { content:''; flex:1; height:1px; background: var(--border); }

  /* ── CARDS ── */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r);
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  /* ── PLANT CARD (overview) ── */
  .plant-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r);
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
    display: flex;
    align-items: stretch;
    cursor: pointer;
    transition: box-shadow 0.15s, transform 0.1s;
    active-scale: 0.98;
  }
  .plant-card:active { transform: scale(0.98); box-shadow: none; }
  .plant-card-accent { width: 5px; flex-shrink: 0; }
  .plant-card-body { padding: 12px 14px; flex: 1; }
  .plant-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .plant-card-name { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--text); }
  .plant-card-sub { font-size: 11px; color: var(--text-light); margin-bottom: 6px; }
  .plant-card-todos { font-size: 12px; color: var(--text-mid); }

  /* ── STATUS BADGE ── */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.3px;
  }
  .status-dot { width: 5px; height: 5px; border-radius: 50%; }
  .s-dobro { background: #d1fae5; color: #065f46; }
  .s-dobro .status-dot { background: #10b981; }
  .s-prati { background: var(--amber-pale); color: #92400e; }
  .s-prati .status-dot { background: var(--amber); }
  .s-hitno { background: var(--red-pale); color: var(--red); }
  .s-hitno .status-dot { background: var(--red); }
  .s-odradjeno { background: var(--indigo-pale); color: var(--indigo); }
  .s-odradjeno .status-dot { background: var(--indigo); }

  /* ── TODO ITEM ── */
  .todo-item {
    background: #fffbf0;
    border: 1px solid #fde68a;
    border-radius: var(--r-sm);
    padding: 9px 12px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 7px;
  }
  .todo-text { flex: 1; font-size: 13px; color: #78350f; line-height: 1.45; }
  .todo-urgent {
    background: #fff5f5;
    border-color: #fca5a5;
  }
  .todo-urgent .todo-text { color: #7f1d1d; }
  .btn-icon {
    background: none;
    border: none;
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 14px;
    flex-shrink: 0;
    transition: background 0.12s;
  }
  .btn-done { color: #059669; }
  .btn-done:active { background: #d1fae5; }
  .btn-del { color: #dc2626; }
  .btn-del:active { background: #fee2e2; }

  /* ── JOURNAL ENTRY ── */
  .entry-item {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 10px 12px;
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
    align-items: flex-start;
  }
  .entry-stripe { width: 3px; border-radius: 4px; align-self: stretch; flex-shrink: 0; }
  .entry-date { font-size: 11px; color: var(--text-light); margin-bottom: 4px; }
  .entry-tags { display: flex; gap: 5px; margin-bottom: 5px; flex-wrap: wrap; }
  .tag {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 10px;
    background: var(--cream-dark);
    color: var(--text-mid);
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .entry-note { font-size: 13px; color: var(--text); line-height: 1.5; }
  .btn-del-sm {
    background: none; border: none;
    color: #ccc; cursor: pointer;
    font-size: 15px; padding: 2px;
    flex-shrink: 0;
    transition: color 0.12s;
  }
  .btn-del-sm:active { color: var(--red); }

  /* ── CALENDAR ── */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 16px 12px;
  }
  .cal-month { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); }
  .cal-nav-btn {
    background: var(--cream-dark);
    border: none;
    width: 34px; height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s;
    color: var(--text);
  }
  .cal-nav-btn:active { background: var(--border); }
  .cal-grid-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 0 8px;
    margin-bottom: 4px;
  }
  .cal-day-name {
    text-align: center;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-light);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 0;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 0 8px 16px;
    gap: 2px;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    transition: background 0.12s;
    gap: 2px;
  }
  .cal-day:active { background: var(--cream-dark); }
  .cal-day.empty { cursor: default; }
  .cal-day.today .cal-day-num {
    background: var(--green-mid);
    color: #fff;
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-day.has-task::after {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--amber);
    position: absolute;
    bottom: 3px;
  }
  .cal-day.has-urgent::after { background: var(--red); }
  .cal-day-num { font-size: 13px; font-weight: 500; color: var(--text); line-height: 26px; }
  .cal-day.other-month .cal-day-num { color: var(--border); }

  /* ── CALENDAR TASKS LIST ── */
  .cal-tasks-header {
    padding: 12px 16px 8px;
    border-top: 1px solid var(--border);
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--text);
  }
  .cal-task-item {
    margin: 0 16px 8px;
    background: var(--cream);
    border-radius: var(--r-sm);
    padding: 10px 12px;
    border-left: 3px solid var(--green-mid);
  }
  .cal-task-item.urgent { border-left-color: var(--red); background: var(--red-pale); }
  .cal-task-plant { font-size: 10px; color: var(--text-light); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
  .cal-task-text { font-size: 13px; color: var(--text); line-height: 1.4; }

  /* ── FORMS ── */
  .form-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-row-3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-light);
    font-weight: 600;
  }
  .form-input, .form-select, .form-textarea {
    border: 1.5px solid var(--border);
    border-radius: var(--r-sm);
    padding: 9px 11px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--cream);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    -webkit-appearance: none;
    width: 100%;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--green-mid);
    background: var(--white);
  }
  .form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .form-btns { display: flex; gap: 8px; margin-top: 12px; }
  .btn-primary {
    background: var(--green-mid);
    color: #fff;
    border: none;
    border-radius: var(--r-sm);
    padding: 10px 20px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    flex: 1;
    transition: background 0.15s;
  }
  .btn-primary:active { background: var(--green-deep); }
  .btn-secondary {
    background: var(--cream-dark);
    color: var(--text-mid);
    border: none;
    border-radius: var(--r-sm);
    padding: 10px 16px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-secondary:active { background: var(--border); }

  /* ── ADD BUTTON (FAB) ── */
  .fab {
    position: fixed;
    bottom: calc(64px + var(--safe-bottom) + 12px);
    right: 20px;
    width: 52px; height: 52px;
    background: var(--green-mid);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(45,90,45,0.40);
    display: flex; align-items: center; justify-content: center;
    z-index: 99;
    transition: transform 0.15s, background 0.15s;
  }
  .fab:active { transform: scale(0.92); background: var(--green-deep); }

  /* ── SMART ALERT ── */
  .alert-banner {
    background: linear-gradient(135deg, #1a3320 0%, #2d5a2d 100%);
    color: #fff;
    padding: 14px 16px;
    border-radius: var(--r);
    margin-bottom: 14px;
    box-shadow: var(--shadow-lg);
  }
  .alert-title { font-family: 'Playfair Display', serif; font-size: 15px; margin-bottom: 4px; }
  .alert-body { font-size: 12px; color: #c8e6c8; line-height: 1.5; }

  /* ── OVERVIEW SCREEN ── */
  .overview-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 14px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--green-mid); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text-light); margin-top: 4px; font-weight: 500; }

  /* ── INLINE PLANT DETAIL ── */
  .plant-detail-header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 12px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    sticky: top;
  }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; color: var(--text-light); font-size: 13px; font-style: italic; padding: 20px 0; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: calc(72px + var(--safe-bottom) + 16px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--green-deep);
    color: #fff;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-sub">Voćnjak · Zagreb</div>
    <div class="header-title">Dnevnik vrta</div>
  </div>
  <div class="header-right">
    <div class="today-badge" id="todayBadge"></div>
  </div>
</div>

<!-- Plant tabs (only visible on plant screen) -->
<div class="nav-tabs" id="plantTabs"></div>

<!-- Main content -->
<div class="main" id="mainContent"></div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <button class="bnav-btn active" id="bnav-overview" onclick="showScreen('overview')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Pregled
  </button>
  <button class="bnav-btn" id="bnav-plants" onclick="showScreen('plants')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V12"/><path d="M12 12C12 12 8 10 6 6c4 0 6 4 6 6z"/><path d="M12 12C12 12 16 10 18 6c-4 0-6 4-6 6z"/><path d="M12 12C12 12 10 16 6 18c0-4 4-6 6-6z"/><path d="M12 12C12 12 14 16 18 18c0-4-4-6-6-6z"/></svg>
    Voćke
  </button>
  <button class="bnav-btn" id="bnav-calendar" onclick="showScreen('calendar')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Kalendar
  </button>
  <button class="bnav-btn" id="bnav-add" onclick="showAddEntry()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Dodaj
  </button>
  <button class="bnav-btn" id="bnav-sync" onclick="showScreen('sync')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/></svg>
    Sinkroniziraj
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────

const PLANTS = [
  { id: "tresnja",   name: "Trešnja Kordia",    emoji: "🍒", subtitle: "Gisela 5 · berba kraj lipnja",        rootstock: "Gisela 5" },
  { id: "nektarina", name: "Nektarina Fantasia", emoji: "🍑", subtitle: "Prunus persica · berba sredina kol.", rootstock: "Prunus persica" },
  { id: "jabuka",    name: "Jabuka Fuji",        emoji: "🍎", subtitle: "MM106 · berba rujan–listopad",        rootstock: "MM106" },
  { id: "sljiva",    name: "Šljiva Stanley",     emoji: "🫐", subtitle: "Myrobalana · berba kraj kolovoza",    rootstock: "Myrobalana" },
  { id: "smreka",    name: "Patuljasta smreka",  emoji: "🌲", subtitle: "Picea glauca 'Conica' · prednji vrt", rootstock: "" },
];

const STATUS_COLORS = {
  dobro:     { cls: "s-dobro",     dot: "#10b981", stripe: "#10b981" },
  prati:     { cls: "s-prati",     dot: "#f59e0b", stripe: "#f59e0b" },
  hitno:     { cls: "s-hitno",     dot: "#ef4444", stripe: "#ef4444" },
  odradjeno: { cls: "s-odradjeno", dot: "#6366f1", stripe: "#6366f1" },
};
const STATUS_LABELS = { dobro: "Dobro", prati: "Pratiti", hitno: "Hitno", odradjeno: "Odrađeno" };

const ENTRY_TYPES = ["bilješka","prskanje","rezidba","sadnja","berba","navodnjavanje","gnojidba","odrađeno"];

// ── SCHEDULED TASKS (calendar) ── month 0-based

// ── STATE ──
let data = null;
let currentScreen = "overview";
let activePlantId = "tresnja";
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let addFormVisible = false;
let addTodoFormVisible = false;
let addFormPlantId = "tresnja";

// ── INIT ──
(async () => {
  try {
    const r = localStorage.getItem(KEY);
    data = r ? JSON.parse(r) : defaultData();
  } catch { data = defaultData(); }
  initUI();
})();

function initUI() {
  // today badge
  const d = new Date();
  document.getElementById("todayBadge").textContent =
    d.toLocaleDateString("hr-HR", { day: "numeric", month: "short" });

  buildPlantTabs();
  showScreen("overview");
}

function saveData() {
  try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(e) {}
  showToast("Spremljeno ✓");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

// ── TABS ──
function buildPlantTabs() {
  const tabs = document.getElementById("plantTabs");
  tabs.innerHTML = PLANTS.map(p => {
    const pd = data[p.id];
    const st = pd.entries[0]?.status || "dobro";
    const dot = STATUS_COLORS[st].dot;
    return `<button class="tab-btn ${p.id === activePlantId ? 'active' : ''}" onclick="setActivePlant('${p.id}')">
      <span>${p.emoji}</span>
      <span class="tab-dot" style="background:${dot}"></span>
    </button>`;
  }).join("");
}

function setActivePlant(id) {
  activePlantId = id;
  buildPlantTabs();
  renderPlantScreen();
}

// ── SCREEN SWITCHING ──
function showScreen(name) {
  currentScreen = name;
  addFormVisible = false;
  addTodoFormVisible = false;

  ["overview","plants","calendar","add","sync"].forEach(s => {
    const b = document.getElementById(`bnav-${s}`);
    if(b) b.classList.toggle("active", s === name);
  });

  const tabs = document.getElementById("plantTabs");
  tabs.style.display = name === "plants" ? "flex" : "none";

  if(name === "overview") renderOverview();
  else if(name === "plants") renderPlantScreen();
  else if(name === "calendar") renderCalendar();
  else if(name === "sync") renderSync();
}

      const pd = data[p.id];
      const st = pd.entries[0]?.status || "dobro";
      const sc = STATUS_COLORS[st];
      const todoCount = pd.todos.length;
      return `<div class="plant-card" onclick="showScreen('plants'); setActivePlant('${p.id}')">
        <div class="plant-card-accent" style="background:${sc.stripe}"></div>

            <div class="status-badge ${sc.cls}"><span class="status-dot"></span>${STATUS_LABELS[st]}</div>
          </div>

          ${todoCount > 0 ? `<div class="plant-card-todos">📋 ${todoCount} zadatak${todoCount > 1 ? (todoCount < 5 ? 'a' : '') : ''}</div>` : ""}
        </div>

    }).join("")}

    ${getWeekTasks()}

function getSmartSuggestion() {
  const now = new Date();
  const m = now.getMonth();
  const d = now.getDate();

  // Check for urgent tasks
  for(const p of PLANTS) {
    const pd = data[p.id];
    if(pd.todos.some(t => t.toLowerCase().includes("ulje") || t.toLowerCase().includes("bakar"))) {
      return "Bijelo mineralno ulje čeka na rasporedu. Prskati zajedno voćnjak i smreku.";
    }
  }
  if(m === 2 && d < 20) return "Ožujak: Rezidba svih voćki preporučena u prvoj polovici.";
  if(m === 3 && d >= 20) return "Kraj travnja: Postavi feromonske klopke i žute ploče.";
  if(m === 4) return "Svibanj: Score 250 EC + Mospilan 20 SP nakon cvatnje jabuke i šljive.";
  return "";
}

function getWeekTasks() {
  const now = new Date();
  const m = now.getMonth();
  const d = now.getDate();
  const relevant = SCHEDULED.filter(t => t.month === m && Math.abs(t.day - d) <= 7);
  if(!relevant.length) return `<div class="empty">Nema zakazanih zadataka ovaj tjedan.</div>`;
  return relevant.map(t => {
    const plantName = t.plant === "sve" ? "Sve biljke" : PLANTS.find(p => p.id === t.plant)?.name || t.plant;
    return `<div class="cal-task-item ${t.urgent ? 'urgent' : ''}">
      <div class="cal-task-plant">${plantName}</div>
      <div class="cal-task-text">${t.text}</div>
    </div>`;
  }).join("");
}

function toggleTodoForm() {
  addTodoFormVisible = !addTodoFormVisible;
  const area = document.getElementById("todoFormArea");
  if(!area) return;
  if(addTodoFormVisible) {
    area.innerHTML = `<div class="form-card" style="margin-bottom:10px">
      <div style="display:flex;gap:8px">
        <input id="todoInput" class="form-input" placeholder="Novi zadatak..." style="flex:1" onkeydown="if(event.key==='Enter')saveTodo()">
        <button onclick="saveTodo()" class="btn-primary" style="flex:0;padding:9px 16px">OK</button>
        <button onclick="toggleTodoForm()" class="btn-secondary" style="padding:9px 12px">✕</button>
      </div>
    </div>`;
    document.getElementById("todoInput")?.focus();
  } else {
    area.innerHTML = "";
  }
}

function saveTodo() {
  const val = document.getElementById("todoInput")?.value?.trim();
  if(!val) return;
  data[activePlantId].todos.push(val);
  saveData();
  addTodoFormVisible = false;
  renderPlantScreen();
}

function completeTodo(idx) {
  const todo = data[activePlantId].todos[idx];
  data[activePlantId].todos.splice(idx, 1);
  const today = new Date().toISOString().split("T")[0];
  const maxId = data[activePlantId].entries.reduce((m,e) => Math.max(m,e.id), 0);
  data[activePlantId].entries.unshift({ id: maxId+1, date: today, type: "odrađeno", note: todo, status: "odradjeno" });
  saveData();
  renderPlantScreen();
}

function removeTodo(idx) {
  data[activePlantId].todos.splice(idx, 1);
  saveData();
  renderPlantScreen();
}

function toggleEntryForm() {
  addFormVisible = !addFormVisible;

function saveEntry() {
  const note = document.getElementById("eNote")?.value?.trim();
  if(!note) return;
  const date = document.getElementById("eDate").value;
  const type = document.getElementById("eType").value;
  const status = document.getElementById("eStatus").value;
  const maxId = data[activePlantId].entries.reduce((m,e) => Math.max(m,e.id), 0);
  data[activePlantId].entries.unshift({ id: maxId+1, date, type, note, status });
  data[activePlantId].entries.sort((a,b) => b.date.localeCompare(a.date));
  saveData();
  addFormVisible = false;
  renderPlantScreen();
}

function removeEntry(id) {
  data[activePlantId].entries = data[activePlantId].entries.filter(e => e.id !== id);
  saveData();
  renderPlantScreen();
}

  const lastDay = new Date(calYear, calMonth+1, 0);
  let startDow = firstDay.getDay(); // 0=Sun
  startDow = (startDow + 6) % 7; // Mon-first

  // which days have tasks
  const taskDays = {};
  SCHEDULED.forEach(t => {
    if(t.month === calMonth) {
      if(!taskDays[t.day]) taskDays[t.day] = false;
      if(t.urgent) taskDays[t.day] = true;
    }
  });

  let daysHTML = "";
  for(let i=0; i<startDow; i++) daysHTML += `<div class="cal-day empty"></div>`;
  for(let d=1; d<=lastDay.getDate(); d++) {
    const isToday = calYear === now.getFullYear() && calMonth === now.getMonth() && d === now.getDate();
    const hasTask = taskDays[d] !== undefined;
    const isUrgent = taskDays[d] === true;
    daysHTML += `<div class="cal-day ${isToday?'today':''} ${hasTask?(isUrgent?'has-urgent':'has-task'):''}" onclick="selectCalDay(${d})">
      <div class="cal-day-num">${d}</div>
    </div>`;
  }

  // All tasks for month
  const monthTasks = SCHEDULED.filter(t => t.month === calMonth).sort((a,b) => a.day - b.day);

  mc.innerHTML = `
    <div class="card">
      <div class="cal-header">
        <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
        <div class="cal-month">${monthNames[calMonth]} ${calYear}</div>
        <button class="cal-nav-btn" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid-header">
        ${["Pon","Uto","Sri","Čet","Pet","Sub","Ned"].map(d => `<div class="cal-day-name">${d}</div>`).join("")}
      </div>
      <div class="cal-grid">${daysHTML}</div>
    </div>

    <div class="section-label">Zakazano ovaj mjesec (${monthTasks.length})</div>

    ${monthTasks.length === 0 ? '<div class="empty">Nema zakazanih zadataka.</div>' : monthTasks.map(t => {
      const plantName = t.plant === "sve" ? "Sve biljke" : PLANTS.find(p => p.id === t.plant)?.name || t.plant;
      return `<div class="cal-task-item ${t.urgent?'urgent':''}">
        <div class="cal-task-plant">${String(t.day).padStart(2,'0')}. ${monthNames[calMonth].slice(0,3)} · ${plantName}</div>
        <div class="cal-task-text">${t.text}</div>
      </div>`;
    }).join("")}
  `;
}

function calNav(dir) {
  calMonth += dir;
  if(calMonth < 0) { calMonth = 11; calYear--; }
  if(calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function selectCalDay(d) {
  const tasks = SCHEDULED.filter(t => t.month === calMonth && t.day === d);
  if(!tasks.length) return;
  const monthNames = ["Siječanj","Veljača","Ožujak","Travanj","Svibanj","Lipanj","Srpanj","Kolovoz","Rujan","Listopad","Studeni","Prosinac"];
  showToast(`${d}. ${monthNames[calMonth]}: ${tasks.length} zadatak${tasks.length > 1 ? 'a' : ''}`);
}

// ── HELPERS ──
function formatDate(d) {
  return new Date(d).toLocaleDateString("hr-HR", { day: "numeric", month: "long", year: "numeric" });
}

// ── SYNC SCREEN ──
function renderSync() {
  const mc = document.getElementById("mainContent");
  const exported = JSON.stringify(data, null, 2);
  const now = new Date().toLocaleDateString("hr-HR", { day: "numeric", month: "long", year: "numeric", hour: "2-digit", minute: "2-digit" });

  // stats
  const totalEntries = PLANTS.reduce((s,p) => s + (data[p.id]?.entries?.length||0), 0);
  const totalTodos = PLANTS.reduce((s,p) => s + (data[p.id]?.todos?.length||0), 0);

  mc.innerHTML = `
    <div class="section-label">Za slanje Claudeu</div>

    <div class="card" style="padding:16px; margin-bottom:12px">
      <div style="font-family:'Playfair Display',serif; font-size:17px; color:var(--green-deep); margin-bottom:6px">📤 Izvezi dnevnik</div>
      <div style="font-size:12px; color:var(--text-light); line-height:1.6; margin-bottom:14px">
        Kopira sve podatke iz dnevnika u clipboard. Zalijepi u Claude razgovor uz pitanje — Claude će odmah vidjeti cijeli tvoj vrt.
      </div>
      <div style="background:var(--cream); border:1px solid var(--border); border-radius:var(--r-sm); padding:10px 12px; margin-bottom:12px; font-size:11px; color:var(--text-mid)">
        📊 ${totalEntries} bilješki · ${totalTodos} zadataka · ${PLANTS.length} biljki<br>
        🕐 ${now}
      </div>
      <button onclick="exportData()" class="btn-primary" style="width:100%">
        📋 Kopiraj dnevnik u clipboard
      </button>
    </div>

    <div class="card" style="padding:16px; margin-bottom:12px">
      <div style="font-family:'Playfair Display',serif; font-size:17px; color:var(--green-deep); margin-bottom:6px">💾 Preuzmi kao datoteku</div>
      <div style="font-size:12px; color:var(--text-light); line-height:1.6; margin-bottom:14px">
        Sprema JSON datoteku na uređaj — backup ili za slanje Claudeu kao prilog.
      </div>
      <button onclick="downloadData()" class="btn-primary" style="width:100%">
        ⬇️ Preuzmi vocnjak-backup.json
      </button>
    </div>

    <div class="card" style="padding:16px; margin-bottom:12px">
      <div style="font-family:'Playfair Display',serif; font-size:17px; color:var(--green-deep); margin-bottom:6px">📥 Uvezi dnevnik</div>
      <div style="font-size:12px; color:var(--text-light); line-height:1.6; margin-bottom:14px">
        Zalijepi JSON koji si dobio od Claudea (npr. nakon što je dodao bilješke ili ažurirao podatke).
      </div>
      <textarea id="importArea" class="form-textarea" placeholder='Zalijepi JSON ovdje...' style="font-size:11px; font-family:monospace; min-height:100px"></textarea>
      <button onclick="importData()" class="btn-primary" style="width:100%; margin-top:8px">
        📥 Uvezi podatke
      </button>
    </div>

    <div class="section-label">Upute za korištenje</div>
    <div class="card" style="padding:16px; margin-bottom:12px">
      <div style="font-size:13px; color:var(--text-mid); line-height:1.8">
        <div style="margin-bottom:8px">1️⃣ Tapni <strong>"Kopiraj dnevnik"</strong></div>
        <div style="margin-bottom:8px">2️⃣ Otvori Claude razgovor u ovom Projectu</div>
        <div style="margin-bottom:8px">3️⃣ Zalijepi i napiši pitanje — npr. <em>"Evo stanja vrta, što trebam raditi ovaj tjedan?"</em></div>
        <div style="margin-bottom:8px">4️⃣ Ako Claude ažurira podatke, kopiraj novi JSON i uvezi ga nazad ovdje</div>
      </div>
    </div>
  `;
}

function exportData() {
  const exported = JSON.stringify(data, null, 2);
  const now = new Date().toLocaleDateString("hr-HR");
  const text = `DNEVNIK VOĆNJAKA - Zagreb\nExport: ${now}\n\n${exported}`;
  navigator.clipboard.writeText(text).then(() => {
    showToast("✓ Kopirano u clipboard!");
  }).catch(() => {
    // fallback
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    showToast("✓ Kopirano!");
  });
}

function downloadData() {
  const exported = JSON.stringify(data, null, 2);
  const now = new Date().toISOString().split("T")[0];
  const blob = new Blob([exported], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `vocnjak-backup-${now}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("✓ Preuzimanje počelo!");
}

function importData() {
  const raw = document.getElementById("importArea")?.value?.trim();
  if(!raw) { showToast("Nema podataka za uvoz"); return; }
  try {
    // strip header if present
    const jsonStart = raw.indexOf("{");
    const jsonStr = jsonStart > 0 ? raw.slice(jsonStart) : raw;
    const parsed = JSON.parse(jsonStr);
    // validate
    const valid = PLANTS.every(p => parsed[p.id] && Array.isArray(parsed[p.id].entries) && Array.isArray(parsed[p.id].todos));
    if(!valid) { showToast("❌ Neispravni podaci"); return; }
    data = parsed;
    saveData();
    showToast("✓ Podaci uvezeni!");
    setTimeout(() => showScreen("overview"), 1000);
  } catch(e) {
    showToast("❌ Greška pri uvozu");
  }
}
</script>
