function saveNewPlant() {
  // Session 17.5: catalog-backed plant.type required + citrus subtype required
  const type = document.getElementById("apType")?.value || "";
  if(!type || !Object.prototype.hasOwnProperty.call(PLANT_CATALOG, type)) {
    showToast("Odaberi tip biljke iz kataloga"); return;
  }
  const name = document.getElementById("apName")?.value?.trim();
  if(!name) { showToast("Upiši ime biljke"); return; }
  let variety = "";
  if(type === "citrus") {
    const sub = document.getElementById("apCitrusSubtype")?.value || "";
    const allowed = PLANT_CATALOG.citrus.subtypes || [];
    if(!sub || allowed.indexOf(sub) === -1) {
      showToast("Odaberi vrstu citrusa"); return;
    }
    variety = sub;
  } else {
    const v = document.getElementById("apVariety")?.value || "";
    if(v !== "") {
      const allowed = PLANT_CATALOG[type].varieties || [];
      if(allowed.indexOf(v) === -1) {
        showToast("Odaberi sortu iz kataloga"); return;
      }
      variety = v;
    }
  }
  const rootstock = document.getElementById("apRootstock")?.value?.trim() || "";
  const plantedDate = document.getElementById("apPlantedDate")?.value || "";
  const notes = document.getElementById("apNotes")?.value?.trim() || "";
  const id = "plant_" + Date.now();
  const plant = { id, type, name, variety, rootstock, plantedDate, status: "forming", legacyStatus: "", notes };
  let v4;
  try {
    const raw = localStorage.getItem("vocnjak_v4");
    v4 = raw ? JSON.parse(raw) : null;
    if(!v4 || typeof v4.plants !== "object") { showToast("Podaci nisu dostupni"); return; }
  } catch(e) { showToast("Greška pri čitanju podataka"); return; }
  v4.plants[id] = plant;
  if (!Array.isArray(v4.plans)) v4.plans = [];
  const generated = _generatePlansForPlant(plant);
  for (const gp of generated) {
    if (!v4.plans.some(p => p && p.id === gp.id)) {
      v4.plans.push(gp);
    }
  }
  try {
    localStorage.setItem("vocnjak_v4", JSON.stringify(v4));
  } catch(e) { showToast("Greška pri spremanju"); return; }
  activePlantId = id;
  showToast("Spremljeno ✓");
  showScreen("plants");
}

// ── CALENDAR v4 HELPER ──
function getCalendarItemsV4(v4, year, month) {
  // month is 0-based; plan fields are 1-based
  const month1 = month + 1;
  const items = [];

  // Plans → derived state per day
  const today = new Date();
  const todayNorm = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  (v4.plans || []).forEach(pl => {
    if(pl.skipYear === year) return;
    const { start, end } = _getPlanWindow(pl, year);
    const startNorm = new Date(start.getFullYear(), start.getMonth(), start.getDate());
    const endNorm = new Date(end.getFullYear(), end.getMonth(), end.getDate());
    // Tolerance for matching only (±7 days)
    const effectiveStart = new Date(startNorm); effectiveStart.setDate(effectiveStart.getDate() - 7);
    const effectiveEnd = new Date(endNorm); effectiveEnd.setDate(effectiveEnd.getDate() + 7);
    // Check for matching activity
    const hasMatch = (v4.activities || []).some(a => {
      if(!a.date) return false;
      const aType = (a.type || "").toLowerCase().trim();
      const pType = (pl.activityType || "").toLowerCase().trim();
      if(aType !== pType) return false;
      const ad = new Date(a.date);
      if(isNaN(ad.getTime())) return false;
      const adNorm = new Date(ad.getFullYear(), ad.getMonth(), ad.getDate());
      if(adNorm < effectiveStart || adNorm > effectiveEnd) return false;
      if(pl.appliesToAll) return true;
      return (a.plantIds || []).some(pid => (pl.plantIds || []).includes(pid));
    });
    // Done plans excluded from calendar dots
    if(hasMatch) return;
    // Derive state
    let state;
    if(todayNorm < startNorm) state = "upcoming";
    else if(todayNorm <= endNorm) state = "active";
    else if(todayNorm > effectiveEnd) state = "missed";
    else state = "active"; // within tolerance period after window but not yet missed
    // Add item for each day in window within this month
    const plantIds = pl.appliesToAll ? [] : (pl.plantIds || []);
    const firstDay = (start.getMonth() === month) ? start.getDate() : 1;
    const lastDayOfMonth = new Date(year, month + 1, 0).getDate();
    const lastDay = (end.getMonth() === month) ? end.getDate() : lastDayOfMonth;
    if(start.getMonth() > month || end.getMonth() < month) return;
    for(let d = firstDay; d <= lastDay; d++) {
      items.push({ day: d, type: state, title: pl.title || "", plantIds });
    }
  });

  // Activities → "done" or "skipped" only
  (v4.activities || []).forEach(a => {
    if(!a.date) return;
    const d = new Date(a.date);
    if(isNaN(d.getTime())) return;
    if(d.getFullYear() !== year || d.getMonth() !== month) return;
    if(a.status !== "done" && a.status !== "skipped") return;
    items.push({ day: d.getDate(), type: a.status, title: a.type || "", plantIds: a.plantIds || [] });
  });

  return items;
}

// ── CALENDAR ──
function renderCalendar() {
  const mc = document.getElementById("mainContent");
  const now = new Date();
  const monthNames = ["Siječanj","Veljača","Ožujak","Travanj","Svibanj","Lipanj","Srpanj","Kolovoz","Rujan","Listopad","Studeni","Prosinac"];
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth+1, 0);
  let startDow = (firstDay.getDay() + 6) % 7;

  const v4 = _loadV4();
  const useV4 = v4 && typeof v4.plants === "object" && Array.isArray(v4.activities) && Array.isArray(v4.plans);

  if(useV4) {
    const items = getCalendarItemsV4(v4, calYear, calMonth);

    // Single dot per day — priority: done(4) > active(3) > missed(2) > upcoming(1)
    const PRIORITY = { done: 4, active: 3, missed: 2, upcoming: 1, skipped: 1 };
    const dayType = {};
    items.forEach(item => {
      const prev = dayType[item.day];
      if(!prev || (PRIORITY[item.type] || 0) > (PRIORITY[prev] || 0)) {
        dayType[item.day] = item.type;
      }
    });

    let daysHTML = "";
    for(let i=0; i<startDow; i++) daysHTML += `<div class="cal-day empty"></div>`;
    for(let d=1; d<=lastDay.getDate(); d++) {
      const isToday = calYear===now.getFullYear() && calMonth===now.getMonth() && d===now.getDate();
      const t = dayType[d];
      const dotClass = t === "done" ? "has-done" : (t === "active" || t === "upcoming") ? "has-task" : t === "missed" ? "has-missed" : t === "skipped" ? "has-skipped" : "";
      daysHTML += `<div class="cal-day ${isToday?'today':''} ${dotClass}" onclick="selectCalDay(${d})"><div class="cal-day-num">${d}</div></div>`;
    }

    const TYPE_ORDER = { done: 0, skipped: 0, active: 1, upcoming: 1, missed: 1 };
    const monthItems = items.slice().sort((a,b) => a.day - b.day || (TYPE_ORDER[a.type] || 0) - (TYPE_ORDER[b.type] || 0));

    mc.innerHTML = `
      <div class="card">
        <div class="cal-header">
          <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
          <div class="cal-month">${monthNames[calMonth]} ${calYear}</div>
          <button class="cal-nav-btn" onclick="calNav(1)">›</button>
        </div>
        <div class="cal-grid-header">${["Pon","Uto","Sri","Čet","Pet","Sub","Ned"].map(d=>`<div class="cal-day-name">${d}</div>`).join("")}</div>
        <div class="cal-grid">${daysHTML}</div>
      </div>
      <div id="calDayDetail"></div>
      <div class="section-label">Ovaj mjesec (${monthItems.length})</div>
      ${monthItems.length === 0 ? '<div class="empty">Nema stavki.</div>' : monthItems.map(item => {
        const plantLabel = item.plantIds.length === 0
          ? "Sve biljke"
          : item.plantIds.map(id => v4.plants[id]?.name || id).join(", ");
        const isActivity = item.type === "done" || item.type === "skipped";
        const borderColor = isActivity ? "var(--green-mid)" : item.type === "missed" ? "#9ca3af" : "var(--amber)";
        const stateLabel = { active:"Aktivan", upcoming:"Predstojeći", missed:"Propušteno" };
        const label = isActivity ? _v4TypeLabel(item.title) : item.title;
        const stateSuffix = !isActivity && stateLabel[item.type] ? ` · <span style="font-size:11px;color:${borderColor}">${stateLabel[item.type]}</span>` : "";
        return `<div class="cal-task-item" style="border-left-color:${borderColor}">
          <div class="cal-task-plant">${String(item.day).padStart(2,'0')}. ${monthNames[calMonth].slice(0,3)} · ${plantLabel}</div>
          <div class="cal-task-text">${label}${stateSuffix}</div>
        </div>`;
      }).join("")}
    `;
    return;
  }

  // ── legacy path (untouched) ──
  const taskDays = {};
  getScheduled().forEach(t => {
    if(t.month === calMonth) { if(!taskDays[t.day]) taskDays[t.day] = false; if(t.urgent) taskDays[t.day] = true; }
  });

  let daysHTML = "";
  for(let i=0; i<startDow; i++) daysHTML += `<div class="cal-day empty"></div>`;
  for(let d=1; d<=lastDay.getDate(); d++) {
    const isToday = calYear===now.getFullYear() && calMonth===now.getMonth() && d===now.getDate();
    const hasTask = taskDays[d] !== undefined;
    const isUrgent = taskDays[d] === true;
    daysHTML += `<div class="cal-day ${isToday?'today':''} ${hasTask?(isUrgent?'has-urgent':'has-task'):''}" onclick="selectCalDay(${d})"><div class="cal-day-num">${d}</div></div>`;
  }

  const monthTasks = getScheduled().filter(t => t.month === calMonth).sort((a,b) => a.day - b.day);

  mc.innerHTML = `
    <div class="card">
      <div class="cal-header">
        <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
        <div class="cal-month">${monthNames[calMonth]} ${calYear}</div>
        <button class="cal-nav-btn" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid-header">${["Pon","Uto","Sri","Čet","Pet","Sub","Ned"].map(d=>`<div class="cal-day-name">${d}</div>`).join("")}</div>
      <div class="cal-grid">${daysHTML}</div>
    </div>
    <div class="section-label">Zakazano ovaj mjesec (${monthTasks.length})</div>
    ${monthTasks.length === 0 ? '<div class="empty">Nema zakazanih zadataka.</div>' : monthTasks.map(t => {
      const pName = t.plant==="sve" ? "Sve biljke" : PLANTS.find(p=>p.id===t.plant)?.name || t.plant;
      const pEmoji = t.plant==="sve" ? "🌿" : PLANTS.find(p=>p.id===t.plant)?.emoji || "";
      return `<div class="cal-task-item ${t.urgent?'urgent':''}">
        <div class="cal-task-plant">${String(t.day).padStart(2,'0')}. ${monthNames[calMonth].slice(0,3)} · ${pEmoji} ${pName}</div>
        <div class="cal-task-text">${t.text}</div>
      </div>`;
    }).join("")}
  `;
}

function calNav(dir) {
  calMonth += dir;
  if(calMonth < 0) { calMonth=11; calYear--; }
  if(calMonth > 11) { calMonth=0; calYear++; }
  renderCalendar();
}

function selectCalDay(d) {
  const v4 = _loadV4();
  const useV4 = v4 && typeof v4.plants === "object" && Array.isArray(v4.activities) && Array.isArray(v4.plans);
  if(useV4) { selectCalDayV4(v4, d); return; }

  const tasks = getScheduled().filter(t => t.month===calMonth && t.day===d);
  if(!tasks.length) return;
  const monthNames = ["Siječanj","Veljača","Ožujak","Travanj","Svibanj","Lipanj","Srpanj","Kolovoz","Rujan","Listopad","Studeni","Prosinac"];
  showToast(`${d}. ${monthNames[calMonth]}: ${tasks.length} zadatak${tasks.length>1?'a':''}`);
}

function selectCalDayV4(v4, d) {
  const items = getCalendarItemsV4(v4, calYear, calMonth).filter(item => item.day === d);
  if(!items.length) return;
  const monthNames = ["Siječanj","Veljača","Ožujak","Travanj","Svibanj","Lipanj","Srpanj","Kolovoz","Rujan","Listopad","Studeni","Prosinac"];
  const stateLabel = { active:"Aktivan", upcoming:"Predstojeći", missed:"Propušteno" };
  const activities = items.filter(i => i.type === "done" || i.type === "skipped");
  const plans = items.filter(i => i.type === "active" || i.type === "upcoming" || i.type === "missed");
  let html = `<div class="section-label" style="margin-top:12px">${d}. ${monthNames[calMonth]}</div>`;
  if(activities.length > 0) {
    html += activities.map(a => {
      const plantLabel = a.plantIds.length === 0 ? "Sve biljke" : a.plantIds.map(id => v4.plants[id]?.name || id).join(", ");
      return `<div class="cal-task-item" style="border-left-color:var(--green-light)">
        <div class="cal-task-plant">${plantLabel}</div>
        <div class="cal-task-text">${_v4TypeLabel(a.title)}</div>
      </div>`;
    }).join("");
  }
  if(plans.length > 0) {
    html += plans.map(p => {
      const plantLabel = p.plantIds.length === 0 ? "Sve biljke" : p.plantIds.map(id => v4.plants[id]?.name || id).join(", ");
      const color = p.type === "missed" ? "#9ca3af" : "var(--amber)";
      return `<div class="cal-task-item" style="border-left-color:${color}">
        <div class="cal-task-plant">${plantLabel}</div>
        <div class="cal-task-text">${p.title} · <span style="font-size:11px;color:${color}">${stateLabel[p.type] || p.type}</span></div>
      </div>`;
    }).join("");
  }
  const detail = document.getElementById("calDayDetail");
  if(detail) {
    detail.innerHTML = html;
    detail.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }
}

function exportData() {
  const now = new Date().toLocaleDateString("hr-HR");
  const text = `DNEVNIK VOCNJAKA - Zagreb\nExport: ${now}\n\n${JSON.stringify(data, null, 2)}`;
  navigator.clipboard.writeText(text).then(() => showToast("✓ Kopirano u clipboard!")).catch(() => {
    const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); showToast("✓ Kopirano!");
  });
}

function downloadData() {
  const now = new Date().toISOString().split("T")[0];
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = `vocnjak-backup-${now}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast("✓ Preuzimanje počelo!");
}

function importData() {
  const raw = document.getElementById("importArea")?.value?.trim();
  if(!raw) { showToast("Nema podataka za uvoz"); return; }
  try {
    const jsonStart = raw.indexOf("{");
    const parsed = JSON.parse(jsonStart > 0 ? raw.slice(jsonStart) : raw);
    const valid = PLANTS.every(p => parsed[p.id] && Array.isArray(parsed[p.id].entries) && Array.isArray(parsed[p.id].todos));
    if(!valid) { showToast("❌ Neispravni podaci"); return; }
    data = parsed; saveData(); showToast("✓ Podaci uvezeni!"); setTimeout(() => showScreen("overview"), 1000);
  } catch(e) { showToast("❌ Greška pri uvozu"); }
}

// ── SESSION 17 — v4 EXPORT / IMPORT ──
function exportV4JSON() {
  const raw = localStorage.getItem("vocnjak_v4");
  if(!raw) { showToast("❌ Nema v4 podataka"); return; }
  try { JSON.parse(raw); } catch(e) { showToast("❌ Neispravan v4 u memoriji"); return; }
  const now = new Date().toISOString().split("T")[0];
  const blob = new Blob([raw], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `vocnjak-v4-${now}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("✓ v4 izvezen");
}

function importV4JSON(file) {
  if(!file) { showToast("❌ Datoteka nije odabrana"); return; }
  const reader = new FileReader();
  reader.onerror = () => showToast("❌ Greška pri čitanju datoteke");
  reader.onload = () => {
    let parsed;
    try { parsed = JSON.parse(reader.result); }
    catch(e) { showToast("❌ Neispravan JSON"); return; }
    const result = _validateV4Import(parsed);
    if(!result.ok) { showToast("❌ " + result.error); return; }
    const currentRaw = localStorage.getItem("vocnjak_v4");
    localStorage.setItem("vocnjak_v4_preimport_backup", currentRaw == null ? "" : currentRaw);
    localStorage.setItem("vocnjak_v4", JSON.stringify(parsed));
    buildPlantTabs();
    showScreen("sync");
    showToast("✓ v4 uvezen");
  };
  reader.readAsText(file);
}

function _validateV4Import(parsed) {
  const ALLOWED_TYPES = ["spraying","pruning","fertilizing","watering","planting","harvest","observation","problem","monitoring"];
  const ALLOWED_PLANT_STATUS = ["forming","issue",""];
  const isPlainObject = (v) => v !== null && typeof v === "object" && !Array.isArray(v);
  const isNonEmptyString = (v) => typeof v === "string" && v.length > 0;
  const isISODate = (v) => {
    if(typeof v !== "string" || !/^\d{4}-\d{2}-\d{2}$/.test(v)) return false;
    const [yr, mo, dy] = v.split("-").map(Number);
    const d = new Date(Date.UTC(yr, mo - 1, dy));
    return d.getUTCFullYear() === yr && d.getUTCMonth() === mo - 1 && d.getUTCDate() === dy;
  };

  // Root
  if(!isPlainObject(parsed)) return { ok: false, error: "Korijenski objekt nije valjan" };

  // V4 shape
  if(!isPlainObject(parsed.plants)) return { ok: false, error: "plants mora biti objekt" };
  if(!Array.isArray(parsed.activities)) return { ok: false, error: "activities mora biti polje" };
  if(!Array.isArray(parsed.plans)) return { ok: false, error: "plans mora biti polje" };

  // Plants
  const plantIdSet = new Set();
  for(const [key, plant] of Object.entries(parsed.plants)) {
    if(!isPlainObject(plant)) return { ok: false, error: "biljka nije objekt" };
    if(!isNonEmptyString(plant.id)) return { ok: false, error: "biljka nema id" };
    if(plant.id !== key) return { ok: false, error: "biljka.id ne odgovara ključu" };
    if(!isNonEmptyString(plant.name)) return { ok: false, error: "biljka nema naziv" };
    for(const f of ["variety","rootstock","status","legacyStatus","notes","plantedDate"]) {
      if(plant[f] !== undefined && typeof plant[f] !== "string") return { ok: false, error: "biljka." + f + " mora biti string" };
    }
    if(typeof plant.plantedDate === "string" && plant.plantedDate !== "" && !/^\d{4}-\d{2}-\d{2}$/.test(plant.plantedDate)) {
      return { ok: false, error: "biljka.plantedDate nije ispravan datum" };
    }
    if(typeof plant.status === "string" && !ALLOWED_PLANT_STATUS.includes(plant.status)) {
      return { ok: false, error: "biljka.status nije valjan" };
    }
    plantIdSet.add(plant.id);
  }

  // Activities
  for(const act of parsed.activities) {
    if(!isPlainObject(act)) return { ok: false, error: "aktivnost nije objekt" };
    if(!isNonEmptyString(act.id)) return { ok: false, error: "aktivnost nema id" };
    if(!isNonEmptyString(act.type) || !ALLOWED_TYPES.includes(act.type)) return { ok: false, error: "aktivnost.type nije valjan" };
    if(!isISODate(act.date)) return { ok: false, error: "aktivnost.date nije valjan" };
    if(act.status !== "done") return { ok: false, error: "aktivnost.status nije valjan" };
    if(!Array.isArray(act.plantIds) || act.plantIds.length === 0) return { ok: false, error: "aktivnost.plantIds je prazno" };
    for(const pid of act.plantIds) {
      if(typeof pid !== "string") return { ok: false, error: "aktivnost.plantIds sadrži nevažeći ID" };
      if(!plantIdSet.has(pid)) return { ok: false, error: "aktivnost referencira nepoznatu biljku" };
    }
    if(typeof act.product !== "string") return { ok: false, error: "aktivnost.product mora biti string" };
    if(typeof act.notes !== "string") return { ok: false, error: "aktivnost.notes mora biti string" };
  }

  // Plans
  for(const plan of parsed.plans) {
    if(!isPlainObject(plan)) return { ok: false, error: "plan nije objekt" };
    if(!isNonEmptyString(plan.id)) return { ok: false, error: "plan nema id" };
    if(typeof plan.title !== "string") return { ok: false, error: "plan.title mora biti string" };
    if(typeof plan.activityType !== "string") return { ok: false, error: "plan.activityType mora biti string" };
    if(plan.activityType !== "" && !ALLOWED_TYPES.includes(plan.activityType)) return { ok: false, error: "plan.activityType nije valjan" };
    if(!Number.isInteger(plan.monthStart) || plan.monthStart < 1 || plan.monthStart > 12) return { ok: false, error: "plan.monthStart nije valjan" };
    const hasAppliesAll = plan.appliesToAll === true;
    const hasPlantList = Array.isArray(plan.plantIds) && plan.plantIds.length > 0;
    if(!hasAppliesAll && !hasPlantList) return { ok: false, error: "plan nema biljke" };
    if(Array.isArray(plan.plantIds)) {
      for(const pid of plan.plantIds) {
        if(typeof pid !== "string") return { ok: false, error: "plan.plantIds sadrži nevažeći ID" };
        if(!plantIdSet.has(pid)) return { ok: false, error: "plan referencira nepoznatu biljku" };
      }
    }
    if(plan.dayStart !== undefined && plan.dayStart !== "" && typeof plan.dayStart !== "string" && typeof plan.dayStart !== "number") return { ok: false, error: "plan.dayStart nije valjan" };
    if(plan.monthEnd !== undefined && plan.monthEnd !== "" && !(Number.isInteger(plan.monthEnd) && plan.monthEnd >= 1 && plan.monthEnd <= 12)) return { ok: false, error: "plan.monthEnd nije valjan" };
    if(plan.dayEnd !== undefined && plan.dayEnd !== "" && typeof plan.dayEnd !== "string" && typeof plan.dayEnd !== "number") return { ok: false, error: "plan.dayEnd nije valjan" };
    if(plan.skipYear !== undefined && plan.skipYear !== "" && !Number.isInteger(plan.skipYear)) return { ok: false, error: "plan.skipYear nije valjan" };
    if(plan.notes !== undefined && typeof plan.notes !== "string") return { ok: false, error: "plan.notes mora biti string" };
  }

  return { ok: true };
}

function formatDate(d) {
  return new Date(d).toLocaleDateString("hr-HR", { day: "numeric", month: "long", year: "numeric" });
}
