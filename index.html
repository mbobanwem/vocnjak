    --green-pale: #e8f0e8;

    --red: #b91c1c;

    --indigo: #4338ca;

    --text-light: #8a8070;

    --white: #ffffff;

  .header { background: var(--green-deep); padding: calc(var(--safe-top) + 14px) 20px 14px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(0,0,0,0.25); }
  .header-title { font-family: 'Playfair Display', serif; color: #fff; font-size: 20px; }
  .header-sub { font-size: 10px; color: #7aad7a; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; }
  .today-badge { background: rgba(255,255,255,0.12); color: #c8e6c8; font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 500; }

  .nav-tabs { display: flex; background: var(--green-mid); padding: 0 6px; gap: 2px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .tab-btn { background: transparent; border: none; color: #c8e6c8; padding: 9px 14px 7px; font-size: 11px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; border-radius: 6px 6px 0 0; white-space: nowrap; display: flex; align-items: center; gap: 5px; transition: background 0.15s, color 0.15s; flex-shrink: 0; }
  .tab-btn.active { background: var(--cream); color: var(--green-deep); font-weight: 700; }
  .tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); border-top: 1px solid var(--border); display: flex; padding-bottom: var(--safe-bottom); z-index: 100; box-shadow: 0 -2px 16px rgba(0,0,0,0.08); }
  .bnav-btn { flex: 1; background: none; border: none; padding: 10px 4px 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--text-light); font-size: 10px; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: color 0.15s; }
  .bnav-btn.active { color: var(--green-mid); }
  .bnav-btn svg { width: 22px; height: 22px; }

  .main { padding: 16px 16px calc(72px + var(--safe-bottom)) 16px; max-width: 520px; margin: 0 auto; }

  .section-label { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-light); font-weight: 500; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }

  .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow); }

  .overview-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; box-shadow: var(--shadow); text-align: center; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; }

  .stat-card.clickable:hover { border-color: var(--green-mid); }

  .stat-num.red { color: var(--red); }
  .stat-label { font-size: 11px; color: var(--text-light); margin-top: 4px; font-weight: 500; }
  .stat-arrow { font-size: 10px; color: var(--green-light); margin-top: 2px; }

  /* ── ALERT BANNER ── */
  .alert-banner { background: linear-gradient(135deg, #1a3320 0%, #2d5a2d 100%); color: #fff; padding: 14px 16px; border-radius: var(--r); margin-bottom: 14px; box-shadow: var(--shadow-lg); position: relative; }
  .alert-title { font-family: 'Playfair Display', serif; font-size: 15px; margin-bottom: 4px; padding-right: 28px; }

  .plant-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 10px; overflow: hidden; box-shadow: var(--shadow); display: flex; align-items: stretch; cursor: pointer; transition: box-shadow 0.15s, transform 0.1s; }

  .btn-done { color: #059669; } .btn-done:active { background: #d1fae5; }

  .entry-item { background: var(--white); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 10px 12px; display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
  .entry-stripe { width: 3px; border-radius: 4px; align-self: stretch; flex-shrink: 0; }
  .entry-date { font-size: 11px; color: var(--text-light); margin-bottom: 4px; }

  /* ── CALENDAR ── */
  .cal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 12px; }
  .cal-month { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); }
  .cal-nav-btn { background: var(--cream-dark); border: none; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--text); }
  .cal-grid-header { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 8px; margin-bottom: 4px; }
  .cal-day-name { text-align: center; font-size: 10px; font-weight: 600; color: var(--text-light); letter-spacing: 1px; text-transform: uppercase; padding: 4px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 8px 16px; gap: 2px; }
  .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; position: relative; transition: background 0.12s; gap: 2px; }
  .cal-day:active { background: var(--cream-dark); }
  .cal-day.empty { cursor: default; }
  .cal-day.today .cal-day-num { background: var(--green-mid); color: #fff; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .cal-day.has-task::after { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--amber); position: absolute; bottom: 3px; }
  .cal-day.has-urgent::after { background: var(--red); }
  .cal-day.has-done::after { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--green-light); position: absolute; bottom: 3px; }
  .cal-day.has-skipped::after { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #9ca3af; position: absolute; bottom: 3px; }
  .cal-day.has-missed::after { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #9ca3af; position: absolute; bottom: 3px; }
  .cal-day-num { font-size: 13px; font-weight: 500; color: var(--text); line-height: 26px; }
  .cal-task-item { margin: 0 0 8px; background: var(--cream); border-radius: var(--r-sm); padding: 10px 12px; border-left: 3px solid var(--green-mid); }
  .cal-task-item.urgent { border-left-color: var(--red); background: var(--red-pale); }
  .cal-task-plant { font-size: 10px; color: var(--text-light); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
  .cal-task-text { font-size: 13px; color: var(--text); line-height: 1.4; }

  /* ── FORMS ── */
  .form-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); }

  .btn-primary { background: var(--green-mid); color: #fff; border: none; border-radius: var(--r-sm); padding: 10px 20px; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; flex: 1; }

  .btn-secondary { background: var(--cream-dark); color: var(--text-mid); border: none; border-radius: var(--r-sm); padding: 10px 16px; font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; }

  /* ── DETAIL VIEW ── */
  .detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .back-btn { background: var(--cream-dark); border: none; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; color: var(--text-mid); font-family: 'DM Sans', sans-serif; }

  .empty { text-align: center; color: var(--text-light); font-size: 13px; font-style: italic; padding: 20px 0; }

  .toast { position: fixed; bottom: calc(72px + var(--safe-bottom) + 16px); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--green-deep); color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; z-index: 200; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width: 0; }

  /* ── WEATHER WIDGET ── */
  .weather-card { background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%); border: 1px solid #bae6fd; border-radius: var(--r); padding: 14px 16px; margin-bottom: 14px; }
  .weather-row { display: flex; justify-content: space-between; align-items: center; }
  .weather-day { text-align: center; flex: 1; }
  .weather-day-label { font-size: 10px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .weather-temp { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); }
  .weather-rain { font-size: 11px; color: #0369a1; margin-top: 2px; }
  .weather-divider { width: 1px; height: 40px; background: #bae6fd; margin: 0 8px; flex-shrink: 0; }
  .weather-warn { background: #fef3c7; border: 1px solid #fde68a; border-radius: var(--r-sm); padding: 8px 12px; margin-top: 10px; font-size: 12px; color: #92400e; line-height: 1.4; }
</style>

  apricot: [
    { key: "e1", title: "Bakar – zaštita PRIJE cvatnje (KRITIČNO – marelica)", activityType: "spraying", monthStart: 1, dayStart: 20, monthEnd: 2, dayEnd: 15, skipYear: 0, notes: "KRITIČNO: marelica cvate u veljači/ožujku — bakar mora biti primijenjen PRIJE.\nPrskati dok su pupovi još zatvoreni ili tek počinju bubriti.\nZaštita od: šarke (Plum pox virus, vektori su lisne uši), monililje, pjegavosti kore.\nCuprablau Z 35 WG ili ekvivalent.\nAko se propusti ovaj termin, ne može se naknadno kompenzirati.\nRazmak od bijelog ulja: min. 7–10 dana.\nOvo je DODATAK zimskom bakru iz shared bloka — primijeniti ranije, prilagođeno marelici." },
    { key: "e2", title: "Praćenje mraza za cvatnje marelice", activityType: "monitoring", monthStart: 2, dayStart: 1, monthEnd: 3, dayEnd: 31, skipYear: 0, notes: "Marelica cvate u veljači/ožujku — mraz je najveći neprijatelj.\nPratiti vremensku prognozu svakodnevno za cvatnje.\nKritična temperatura: ispod -1°C za otvorene cvjetove → oštećenje.\nMoguće mjere zaštite za manja stabla: agrotekstil (navlaka), dimni lonci.\nOvo je informacijska radnja — korisnik mora reagirati prema lokalnim uvjetima.\nLoš rod marelice je najčešće uzrokovan mrazom, ne bolešću ni štetnicima." },
    { key: "e3", title: "Praćenje lisnih ušiju i šarke (marelica)", activityType: "monitoring", monthStart: 4, dayStart: 1, monthEnd: 5, dayEnd: 15, skipYear: 0, notes: "Šarka (Plum pox virus) se prenosi lisnim ušima — pratiti kolonije na naličju listova.\nVizualni pregled: žuti prstenovi/mrlje na listovima = mogući simptom šarke.\nŠarka nema lijeka — zaražena stabla moraju se ukloniti.\nMospilan pri vidljivoj koloniji lisnih uši (preventivna kontrola vektora šarke).\nZa mlada stabla: posebno pratiti." },
    { key: "e4", title: "Post-bloom zaštita – monilija (marelica)", activityType: "spraying", monthStart: 4, dayStart: 15, monthEnd: 5, dayEnd: 15, skipYear: 0, notes: "Nakon cvatnje (marelica cvate ranije — prilagoditi termin prema stanju stabla).\nScore 250 EC za zaštitu od monililje (Monilinia laxa).\nMospilan dodati samo pri vidljivim štetnicima.\nNIKAD prskati otvorene cvjetove.\nZa mlada stabla god. 1–2: nije obavezno." },
    { key: "e5", title: "Prorjeđivanje plodova – marelica", activityType: "observation", monthStart: 5, dayStart: 1, monthEnd: 5, dayEnd: 25, skipYear: 0, notes: "Marelica jako prorodi (ako nije bilo mraza koji je uništio cvjetove).\nOstaviti 1 plod na 8–10 cm grane.\nUkloniti blizance i oštećene plodove.\nBez prorjeđivanja: sitni plodovi, lom grana, iscrpljenost stabla.\nZa mlada stabla god. 1–2 bez uroda: nije potrebno." },
    { key: "e6", title: "Berba marelice", activityType: "harvest", monthStart: 6, dayStart: 5, monthEnd: 7, dayEnd: 25, skipYear: 0, notes: "Termin ovisi o sorti ili fallback grupi — vidi PLANT_CATALOG_V1.md za harvestWindow.\nMarelica dozrijeva brzo i neravnomjerno — 2–3 prolaza kroz ~2 tjedna.\nTest zrelosti: narančasta boja s crvenim rumenilom, blago popuštanje pri pritisku.\nBrati pažljivo — lako se oštećuje i brzo trune.\nRok: 2–3 dana na sobnoj temperaturi, do 1 tjedan na 0–4°C.\nNe ostavljati prezrele plodove — privlače ose, uzrokuju moniliju.\nAko je rod manji od očekivanog → uzrok je gotovo uvijek mraz za cvatnje." }
  ],
  plum: [
    { key: "e1", title: "Praćenje šljivinog savijača (feromonske klopke)", activityType: "monitoring", monthStart: 4, dayStart: 25, monthEnd: 7, dayEnd: 15, skipYear: 0, notes: "Šljivin savijač (Cydia funebrana) — crvi u plodovima šljive.\nPostaviti feromonsku klopku na 1.5–2 m visine.\nTjedno pregledavati ulov.\nNagli porast ulova = insekticid unutar 7–10 dana.\nPraćenje traje i za 2. generaciju (sredina lipnja – sredina srpnja).\nZa mlada stabla god. 1–2 bez ploda: nije prioritet." },
    { key: "e2", title: "Post-bloom zaštita – monilija i šljivin savijač", activityType: "spraying", monthStart: 5, dayStart: 5, monthEnd: 5, dayEnd: 25, skipYear: 0, notes: "Nakon cvatnje. Score 250 EC + Mospilan 20 SP — jedan prolaz.\nZaštita od monililje, pjegavosti lista i šljivinog savijača.\nMospilan NIKAD za cvatnje.\nZa mlada stabla god. 1–2: nije obavezno." },
    { key: "e3", title: "Insekticid – 2. generacija šljivinog savijača", activityType: "spraying", monthStart: 6, dayStart: 15, monthEnd: 7, dayEnd: 10, skipYear: 0, notes: "Mospilan 20 SP — SAMO ako klopke pokažu nagli porast ulova.\nNije preventivno prskanje.\nPrimijeniti ujutro ili navečer.\nZa mlada stabla god. 1–2 bez ploda: nije potrebno." },
    { key: "e4", title: "Prorjeđivanje plodova – šljiva", activityType: "observation", monthStart: 5, dayStart: 20, monthEnd: 6, dayEnd: 15, skipYear: 0, notes: "Šljiva je sklona prerodu — prorjeđivanje bitno za kvalitetu.\nOstaviti 1 plod na 8–10 cm grane.\nUkloniti blizance i oštećene.\nPosebno važno za kasne sorte (Stanley) jer plodovi trebaju dugo rasti.\nZa mlada stabla god. 1–2 bez uroda: nije potrebno." },
    { key: "e5", title: "Mreža protiv ptica – šljiva", activityType: "observation", monthStart: 8, dayStart: 8, monthEnd: 8, dayEnd: 22, skipYear: 0, notes: "Postaviti 1–2 tjedna prije berbe, kada šljiva počne omekšavati.\nKos i drozd napadaju šljivu agresivno pred berbu.\nVeličina: min. 4×4 m. Tip s bočnim zipperom preporučen.\nSkinuti odmah nakon berbe.\nZa mlada stabla god. 1–2 bez uroda: nije potrebno." },
    { key: "e6", title: "Berba šljive", activityType: "harvest", monthStart: 7, dayStart: 20, monthEnd: 9, dayEnd: 20, skipYear: 0, notes: "Termin ovisi o sorti ili fallback grupi — vidi PLANT_CATALOG_V1.md za harvestWindow.\nBrati u više navrata — ne dozrijeva sve odjednom.\nTest: plod omekšao, puna boja, lako se odvaja.\nNe ostavljati prezrele plodove — privlače ose, uzrokuju moniliju.\nZa sušenje i pekmez: ostaviti dulje na stablu za veći udio šećera." }
  ],
  olive: [
    { key: "e1", title: "Zimska rezidba masline", activityType: "pruning", monthStart: 2, dayStart: 1, monthEnd: 3, dayEnd: 15, skipYear: 0, notes: "Rezati nakon najhladnijeg dijela zime.\nUkloniti suhare, vodopije i grane prema unutra krošnje.\nCilj: otvorena krošnja u obliku vaze, dobra cirkulacija zraka.\nSvake 2–3 godine: jača rezidba za obnovu rodnog drva.\nMlada stabla god. 1–3: samo formiranje oblika, ne rezati agresivno.\nVeće rane premazati (Lac Balsam) za rezove iznad 3 cm." },
    { key: "e2", title: "Bakar na rane – maslina", activityType: "spraying", monthStart: 2, dayStart: 1, monthEnd: 3, dayEnd: 31, skipYear: 0, notes: "Primijeniti unutar 1–2 dana nakon rezidbe.\nZaštita od bakterioze masline (Pseudomonas savastanoi — maslinin rak).\nCuprablau Z 35 WG ili ekvivalent." },
    { key: "e3", title: "Gnojidba masline", activityType: "fertilizing", monthStart: 3, dayStart: 1, monthEnd: 4, dayEnd: 15, skipYear: 0, notes: "NPK gnojivo s povišenim dušikom za poticanje vegetativnog rasta.\nPrimijeniti oko stabla, ne direktno na deblo ili korijen.\nMlada stabla: polovica preporučene doze prve 2–3 godine." },
    { key: "e4", title: "Praćenje paunovog oka i maslinovog moljca", activityType: "monitoring", monthStart: 4, dayStart: 1, monthEnd: 5, dayEnd: 31, skipYear: 0, notes: "Paunovo oko (Spilocaea oleagina): žute mrlje s tamnim rubom na listu — tretman bakrom po potrebi.\nMaslinin moljac (Prays oleae): napada cvjetove i plodove.\nVizualni pregled — tretman samo pri vidljivom problemu.\nU kontinentalnoj klimi rijedak problem na otvorenom." },
    { key: "e5", title: "Praćenje maslinove muhe", activityType: "monitoring", monthStart: 6, dayStart: 1, monthEnd: 9, dayEnd: 30, skipYear: 0, notes: "Maslinova muha (Bactrocera oleae) — najvažniji štetnik masline.\nPostaviti žute ljepljive ploče s atraktantom.\nTjedno pregledavati.\nPri jakom naletu: insekticid specifičan za maslinovu muhu (spinosad ili kaolin zemlja).\nZa mlada stabla bez ploda: manje relevantno." },
    { key: "e6", title: "Zaštita od maslinove muhe (po potrebi)", activityType: "spraying", monthStart: 6, dayStart: 1, monthEnd: 9, dayEnd: 30, skipYear: 0, notes: "Primijeniti SAMO ako praćenje (monitoring) pokaže visok ulov.\nSpinosad (organsko) ili kaolin zemlja kao fizička barijera.\nNije preventivno prskanje.\nZa mlada stabla bez ploda: nije potrebno." },
    { key: "e7", title: "Ljetna korekcijska rezidba masline", activityType: "pruning", monthStart: 6, dayStart: 1, monthEnd: 7, dayEnd: 15, skipYear: 0, notes: "Opcijsko uklanjanje vodopija i pregustih izbojaka.\nNe rezati agresivno — smanjuje rod tekuće godine.\nMaslina rodi na jednogodišnjem drvu — ljetna rezidba nije obavezna svake godine." },
    { key: "e8", title: "Navodnjavanje masline (mlada stabla)", activityType: "watering", monthStart: 6, dayStart: 1, monthEnd: 8, dayEnd: 31, skipYear: 0, notes: "Maslina je otporna na sušu — odrasla stabla obično ne trebaju navodnjavanje.\nMlada stabla god. 1–3: 20–30 L tjedno za suhih perioda.\nPrekomjerno navodnjavanje šteti." },
    { key: "e9", title: "Berba maslina", activityType: "harvest", monthStart: 10, dayStart: 1, monthEnd: 12, dayEnd: 31, skipYear: 0, notes: "Zelene masline za ulje s više polifenola: studeni.\nCrne masline za veći prinos ulja: prosinac–siječanj.\nZa konzumne masline u salamuri: brati zelene, studeni.\nMetode: ručno češljanje, mreža ispod stabla, električni češalj.\nPreraditi u ulje max. 24–48h nakon berbe." },
    { key: "e10a", title: "Korekcijska rezidba masline nakon berbe", activityType: "pruning", monthStart: 12, dayStart: 1, monthEnd: 12, dayEnd: 31, skipYear: 0, notes: "Laka korekcijska rezidba odmah nakon berbe.\nUkloniti iscrpljene grane i urediti krošnju za sljedeću sezonu.\nNe rezati agresivno." },
    { key: "e10b", title: "Korekcijska rezidba masline nakon berbe", activityType: "pruning", monthStart: 1, dayStart: 1, monthEnd: 1, dayEnd: 15, skipYear: 0, notes: "Laka korekcijska rezidba odmah nakon berbe.\nUkloniti iscrpljene grane i urediti krošnju za sljedeću sezonu.\nNe rezati agresivno." },
    { key: "e11", title: "Pregled masline za zimu", activityType: "observation", monthStart: 10, dayStart: 15, monthEnd: 11, dayEnd: 30, skipYear: 0, notes: "Pregledati krošnju: suhe grane, znakovi bolesti.\nZa kontinentalnu klimu: provjeriti prognozu mrazeva.\nMlada stabla: zaštititi deblo agrotekstilom za mrazeve ispod -7°C.\nUkloniti ostatke plodova s tla." }
  ],
  fig: [
    { key: "e1", title: "Zimska rezidba smokve", activityType: "pruning", monthStart: 2, dayStart: 1, monthEnd: 3, dayEnd: 1, skipYear: 0, notes: "Rezati kasno u zimi (veljača–ožujak) — smokva je osjetljiva na kasne mrazeve.\nUkloniti suhare i stare iscrpljene grane starije od 3–4 godine.\nSmokva rodi na jednogodišnjem i dvogodišnjem drvu — paziti što se reže.\nBijeli mliječni sok iz rezova je normalan (pazi na kožu — može iritirati).\nVeće rane premazati.\nMlada stabla: formiranje oblika — vaza s 3–5 glavnih grana." },
    { key: "e2", title: "Gnojidba smokve", activityType: "fertilizing", monthStart: 3, dayStart: 1, monthEnd: 4, dayEnd: 15, skipYear: 0, notes: "Umjerena gnojidba — smokva ne treba puno.\nNPK s povišenim kalijem za kvalitetu ploda.\nPrekomjerna gnojidba dušikom: puno lišća, malo plodova." },
    { key: "e3", title: "Pregled smokve – štetnici i bolesti", activityType: "monitoring", monthStart: 5, dayStart: 1, monthEnd: 6, dayEnd: 30, skipYear: 0, notes: "Smokva rijetko ima ozbiljnih štetnika u kontinentalnoj klimi.\nVizualni pregled listova i nezrelih plodova.\nGrinje i lisne uši: rijetko, samo pri suhim vrućim ljetima." },
    { key: "e4", title: "Ljetno skraćivanje izdanaka smokve", activityType: "pruning", monthStart: 6, dayStart: 15, monthEnd: 7, dayEnd: 15, skipYear: 0, notes: "Pinciranje (skraćivanje) jakih izdanaka na 5–6 listova iznad ploda.\nUsmjerava energiju u razvoj plodova.\nNe rezati previše — smanjuje asimilacijsku površinu." },
    { key: "e5", title: "Navodnjavanje smokve (mlada stabla)", activityType: "watering", monthStart: 6, dayStart: 20, monthEnd: 8, dayEnd: 20, skipYear: 0, notes: "Smokva je otporna na sušu — odrasla stabla obično ne trebaju.\nMlada stabla god. 1–3: 20–30 L tjedno za suhih perioda.\nPrekomjerno navodnjavanje uzrokuje pucanje plodova." },
    { key: "e6", title: "Berba ranih (zimskih) smokava", activityType: "harvest", monthStart: 6, dayStart: 15, monthEnd: 7, dayEnd: 10, skipYear: 0, notes: "Rane smokve: plodovi koji su prezimili na prošlogodišnjem drvu.\nNisu prisutne na svim sortama — ovisi o sorti i klimi.\nTest: meka na dodir, vrh se spušta, kapljica meda vidljiva.\nBrati pažljivo — traju 1–2 dana." },
    { key: "e7", title: "Berba glavnog roda smokve", activityType: "harvest", monthStart: 8, dayStart: 1, monthEnd: 10, dayEnd: 15, skipYear: 0, notes: "Glavni rod: kolovoz–listopad ovisno o sorti i klimi.\nBrati samo zrele — smokva dozrijeva postupno, više prolaza.\nTest: plod mekan, koža počinje pucati, boja tamni.\nBrati pažljivo, konzumirati odmah ili sušiti.\nNe ostavljati prezrele plodove — privlače ose i uzrokuju gnilobu." },
    { key: "e8a", title: "Zimska zaštita smokve – mlada stabla", activityType: "observation", monthStart: 11, dayStart: 15, monthEnd: 12, dayEnd: 31, skipYear: 0, notes: "Relevantno za mlada stabla god. 1–3 u kontinentalnoj klimi.\nOmotati deblo agrotekstilom ili slamom.\nSmokva podnosi do -10°C kratkoročno, ali mlada stabla osjetljivija.\nUkloniti zaštitu čim prođe opasnost od mraza u proljeće.\nOdrasla zdrava stabla obično ne trebaju zaštitu." },
    { key: "e8b", title: "Zimska zaštita smokve – mlada stabla", activityType: "observation", monthStart: 1, dayStart: 1, monthEnd: 2, dayEnd: 15, skipYear: 0, notes: "Relevantno za mlada stabla god. 1–3 u kontinentalnoj klimi.\nOmotati deblo agrotekstilom ili slamom.\nSmokva podnosi do -10°C kratkoročno, ali mlada stabla osjetljivija.\nUkloniti zaštitu čim prođe opasnost od mraza u proljeće.\nOdrasla zdrava stabla obično ne trebaju zaštitu." },
    { key: "e9", title: "Pregled smokve za zimu", activityType: "observation", monthStart: 10, dayStart: 15, monthEnd: 11, dayEnd: 30, skipYear: 0, notes: "Ukloniti sve nezrele plodove koji neće sazrjeti — izvor zaraze.\nPregledati deblo i grane na pukotine.\nZa mlada stabla: pripremiti zaštitu za zimu." }
  ],
  citrus_lemon: [
    { key: "e1", title: "Korekcijska rezidba limuna", activityType: "pruning", monthStart: 2, dayStart: 1, monthEnd: 3, dayEnd: 31, skipYear: 0, notes: "Ukloniti suhe grane i vodopije.\nLimun ne podnosi agresivnu rezidbu — samo korekcijska.\nRezati između cvatnji da se ne izgubi rod." },
    { key: "e2", title: "Gnojidba limuna", activityType: "fertilizing", monthStart: 3, dayStart: 1, monthEnd: 10, dayEnd: 1, skipYear: 0, notes: "Limun je pohlepan — gnojiti svaka 4–6 tjedana u vegetaciji.\nKoristiti gnojivo za citrus s mikroelementima (Mg, Fe, Mn).\nŽuto lišće = nedostatak željeza ili dušika." },
    { key: "e3", title: "Navodnjavanje limuna", activityType: "watering", monthStart: 4, dayStart: 1, monthEnd: 10, dayEnd: 31, skipYear: 0, notes: "Redovito navodnjavanje — limun ne podnosi ni sušu ni prekomjernu vlagu.\nLončani uzgoj: svakodnevna provjera ljeti.\nKoristiti vodu bez vapna ako je moguće." },
    { key: "e4", title: "Praćenje štetnika – limun", activityType: "monitoring", monthStart: 4, dayStart: 1, monthEnd: 10, dayEnd: 31, skipYear: 0, notes: "Štitaste uši i lisne uši česti u zatvorenom/zaštićenom uzgoju.\nVizualni pregled naličja listova tjedno.\nTretman (bijelo ulje) pri pojavi — ne preventivno." },
    { key: "e5", title: "Zaštita od štetnika – limun (po potrebi)", activityType: "spraying", monthStart: 4, dayStart: 1, monthEnd: 10, dayEnd: 31, skipYear: 0, notes: "Bijelo mineralno ulje pri pojavi štitastih uši ili lisnih ušiju.\nPaučinac: akaricid pri vidljivim znakovima.\nSamo ako monitoring pokaže problem." },
    { key: "e6", title: "Berba limuna (kontinuirana)", activityType: "harvest", monthStart: 1, dayStart: 1, monthEnd: 12, dayEnd: 31, skipYear: 0, notes: "Limun rodi kontinuirano — brati prema zrelosti.\nTest: puna veličina i žuta boja.\nBrati s peteljkom i listićem za dulje trajanje." },
    { key: "e7", title: "Priprema limuna za zimu", activityType: "observation", monthStart: 10, dayStart: 1, monthEnd: 11, dayEnd: 15, skipYear: 0, notes: "Limun nije otporan na mraz — oštećenje ispod -3°C, grane stradaju ispod -5°C.\nZa kontinentalnu klimu: premjestiti u zaštićeni prostor (5–10°C) prije mrazova.\nPregledati na štetnika pred zimski smještaj." }
  ],
  citrus_orange: [

    { key: "e2", title: "Gnojidba naranče", activityType: "fertilizing", monthStart: 3, dayStart: 1, monthEnd: 5, dayEnd: 1, skipYear: 0, notes: "NPK gnojivo za citrus s mikroelementima u proljeće.\nPonavljati prema potrebi kroz vegetaciju." },
    { key: "e3", title: "Navodnjavanje naranče", activityType: "watering", monthStart: 4, dayStart: 1, monthEnd: 9, dayEnd: 30, skipYear: 0, notes: "Redovito u vegetacijskom periodu.\nZimi smanjiti — u mirovanju potrebe su manje." },
    { key: "e4", title: "Praćenje štetnika – naranča", activityType: "monitoring", monthStart: 4, dayStart: 1, monthEnd: 6, dayEnd: 30, skipYear: 0, notes: "Štitaste uši i lisne uši — vizualni pregled naličja listova.\nTretman (bijelo ulje) pri pojavi. Na otvorenom u sjevernoj klimi rijedak problem." },
    { key: "e5", title: "Zaštita od štetnika – naranča (po potrebi)", activityType: "spraying", monthStart: 4, dayStart: 1, monthEnd: 6, dayEnd: 30, skipYear: 0, notes: "Bijelo ulje pri pojavi štitastih uši.\nSamo ako monitoring pokaže problem." },
    { key: "e6a", title: "Berba naranče", activityType: "harvest", monthStart: 12, dayStart: 1, monthEnd: 12, dayEnd: 31, skipYear: 0, notes: "Naranča dozrijeva zimi — prosinac do veljača.\nMože ostati na stablu tjednima nakon zrelosti bez kvarenja.\nZa kontinentalnu klimu: uzgoj moguć u loncima, unutra zimi." },
    { key: "e6b", title: "Berba naranče", activityType: "harvest", monthStart: 1, dayStart: 1, monthEnd: 2, dayEnd: 28, skipYear: 0, notes: "Naranča dozrijeva zimi — prosinac do veljača.\nMože ostati na stablu tjednima nakon zrelosti bez kvarenja.\nZa kontinentalnu klimu: uzgoj moguć u loncima, unutra zimi." },
    { key: "e7", title: "Priprema naranče za zimu", activityType: "observation", monthStart: 10, dayStart: 1, monthEnd: 11, dayEnd: 15, skipYear: 0, notes: "Premjestiti u zaštićen prostor (min. 5°C) prije prvih mrazova.\nPregledati na štetnika.\nSmanjiti navodnjavanje." }
  ],

function isTodoInWindow(t, daysAhead) {
  if(typeof t === "string" || !t.monthStart) return false;
  const now = new Date();
  const y = now.getFullYear();
  const start = new Date(y, t.monthStart - 1, t.dayStart);
  const end = new Date(y, t.monthEnd - 1, t.dayEnd, 23, 59, 59);
  const futureLimit = new Date(now.getTime() + daysAhead * 86400000);
  return end >= now && start <= futureLimit;
}

// ── ENCRYPTION (AES-GCM via Web Crypto API) ──
const SECURE_KEYS = ["vocnjak_gh_token", "vocnjak_gh_repo", "vocnjak_sb_url", "vocnjak_sb_key"];
const ENC_PREFIX = "enc:";

async function _getCryptoKey() {
  let userKey = localStorage.getItem("vocnjak_user_key");
  if(!userKey) { userKey = crypto.randomUUID(); localStorage.setItem("vocnjak_user_key", userKey); }
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(userKey), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: enc.encode("vocnjak_salt_2026"), iterations: 100000, hash: "SHA-256" },
    keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
  );
}

async function secureSet(name, value) {
  if(!value) { localStorage.removeItem(name); return; }
  try {
    const key = await _getCryptoKey();
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, new TextEncoder().encode(value));
    const combined = new Uint8Array(iv.length + ciphertext.byteLength);
    combined.set(iv);
    combined.set(new Uint8Array(ciphertext), iv.length);
    localStorage.setItem(name, ENC_PREFIX + btoa(String.fromCharCode(...combined)));
  } catch(e) { localStorage.setItem(name, value); }
}

async function secureGet(name) {
  const raw = localStorage.getItem(name);
  if(!raw) return "";
  if(!raw.startsWith(ENC_PREFIX)) return raw;
  try {
    const key = await _getCryptoKey();
    const bytes = Uint8Array.from(atob(raw.slice(ENC_PREFIX.length)), c => c.charCodeAt(0));
    const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: bytes.slice(0, 12) }, key, bytes.slice(12));
    return new TextDecoder().decode(decrypted);
  } catch(e) { return ""; }
}

async function migrateSecureKeys() {
  for(const name of SECURE_KEYS) {
    const val = localStorage.getItem(name);
    if(val && !val.startsWith(ENC_PREFIX)) await secureSet(name, val);
  }
}

// ── ICAL SYNC ──
async function syncIcalOnComplete(todoText) {
  const token = await secureGet("vocnjak_gh_token");
  const repo = (await secureGet("vocnjak_gh_repo")) || "mbobanwem/vocnjak";
  if(!token) return;
  try {
    const [owner, repoName] = repo.split("/");
    const apiBase = `https://api.github.com/repos/${owner}/${repoName}/contents/vocnjak_kalendar_puni_v2.ics`;
    const res = await fetch(apiBase, { headers: { "Authorization": `token ${token}`, "Accept": "application/vnd.github.v3+json" } });
    if(!res.ok) return;
    const fileData = await res.json();
    let icsContent = atob(fileData.content.replace(/\n/g, ""));
    const needle = todoText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').slice(0, 40);
    const regex = new RegExp(`(SUMMARY:)(.*${needle}.*)`, 'i');
    if(!regex.test(icsContent)) {
      const words = todoText.split(/\s+/).filter(w => w.length > 3).slice(0, 3);
      let matched = false;
      for(const w of words) {
        const fuzzy = new RegExp(`(SUMMARY:)(.*${w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}.*)`, 'i');
        if(fuzzy.test(icsContent)) { icsContent = icsContent.replace(fuzzy, '$1✅ $2'); matched = true; break; }
      }
      if(!matched) return;
    } else {
      icsContent = icsContent.replace(regex, '$1✅ $2');
    }
    await fetch(apiBase, {
      method: "PUT",
      headers: { "Authorization": `token ${token}`, "Accept": "application/vnd.github.v3+json", "Content-Type": "application/json" },
      body: JSON.stringify({ message: `✅ ${todoText.slice(0, 50)}`, content: btoa(unescape(encodeURIComponent(icsContent))), sha: fileData.sha })
    });
  } catch(e) { console.log("iCal sync error:", e); }
}

async function supabaseBackup() {

  let userKey = localStorage.getItem("vocnjak_user_key");

      method: "PUT",
      headers: { "apikey": key, "Authorization": `Bearer ${key}`, "Content-Type": "application/json", "Prefer": "return=minimal" },
      body: JSON.stringify({ user_key: userKey, data: data, updated_at: new Date().toISOString() })
    });

async function supabaseRestore() {
  const url = await secureGet("vocnjak_sb_url");
  const key = await secureGet("vocnjak_sb_key");
  if(!url || !key) { showToast("Postavi Supabase URL i key"); return; }
  let userKey = localStorage.getItem("vocnjak_user_key");
  if(!userKey) { showToast("Nema backupa"); return; }
  try {
    const res = await fetch(`${url}/rest/v1/vocnjak_data?user_key=eq.${encodeURIComponent(userKey)}&order=updated_at.desc&limit=1&select=data`, {
      headers: { "apikey": key, "Authorization": `Bearer ${key}`, "Accept": "application/json" }
    });
    if(!res.ok) { showToast("❌ Greška: " + res.status); return; }
    const rows = await res.json();
    if(!rows.length) { showToast("Nema backupa u cloudu"); return; }
    data = rows[0].data;
    try { localStorage.setItem(KEY, JSON.stringify(data)); } catch(e) {}
    showToast("✓ Podaci vraćeni iz clouda!");
    setTimeout(() => showScreen("overview"), 1000);
  } catch(e) { showToast("❌ Greška pri restore-u"); }
}

const TYPE_MAP = {
  prskanje: "spraying", tretman: "spraying",
  rezidba: "pruning", sadnja: "planting", berba: "harvest",
  navodnjavanje: "watering", gnojidba: "fertilizing",
  bilješka: "observation", "odrađeno": "observation", analiza: "observation"
};

const STATUS_MAP_PLANT = { dobro: "forming", prati: "forming", hitno: "issue", odradjeno: "forming" };

function _genActId()  { return "act_"  + Date.now() + "_" + Math.random().toString(36).slice(2,7); }
function _genPlanId() { return "plan_" + Date.now() + "_" + Math.random().toString(36).slice(2,7); }

function _migratePlants(v3) {
  const plants = {};
  PLANTS.forEach(p => {
    const entries = v3[p.id]?.entries || [];
    const rawStatus = entries[0]?.status || "";
    plants["plant_" + p.id] = {
      id:          "plant_" + p.id,
      name:        p.name        || "",
      variety:     p.variety     || "",
      rootstock:   p.rootstock   || "",
      plantedDate: p.plantedDate || "",
      status:      STATUS_MAP_PLANT[rawStatus] || "forming",
      legacyStatus: rawStatus,
      notes:       p.notes      || ""
    };
  });
  return plants;
}

function _migrateActivities(v3) {
  const activities = [];
  PLANTS.forEach(p => {
    (v3[p.id]?.entries || []).forEach(entry => {
      activities.push({
        id:       _genActId(),
        type:     TYPE_MAP[entry.type] || "observation",
        date:     entry.date  || "",
        status:   "done",
        plantIds: ["plant_" + p.id],
        product:  "",
        notes:    entry.note  || ""
      });
    });
  });
  return activities;
}

function _migratePlans(v3) {
  const plans = [];
  PLANTS.forEach(p => {
    (v3[p.id]?.todos || []).forEach(todo => {
      if(typeof todo === "string" || !todo.monthStart) return;
      plans.push({
        id:           _genPlanId(),
        title:        todo.text    || "",
        activityType: "",
        appliesToAll: false,
        plantIds:     ["plant_" + p.id],
        monthStart:   todo.monthStart,
        dayStart:     todo.dayStart  || "",
        monthEnd:     todo.monthEnd  || "",
        dayEnd:       todo.dayEnd    || "",
        skipYear:     todo.skipYear  || "",
        notes:        ""
      });
    });
  });
  return plans;
}

function migrateV3toV4() {
  const raw = localStorage.getItem("vocnjak_v3");
  if(!raw) { console.warn("migrateV3toV4: vocnjak_v3 not found, skipping"); return; }
  if(localStorage.getItem("vocnjak_v4")) { console.warn("migrateV3toV4: vocnjak_v4 already exists, skipping"); return; }

  localStorage.setItem("vocnjak_v3_premigration", raw);
  console.log("migrateV3toV4: backup saved to vocnjak_v3_premigration");

  let v3;
  try { v3 = JSON.parse(raw); } catch(e) { console.error("migrateV3toV4: failed to parse vocnjak_v3", e); return; }

  const plants     = _migratePlants(v3);
  const activities = _migrateActivities(v3);
  const plans      = _migratePlans(v3);

  if(typeof plants !== "object" || Array.isArray(plants) || Object.keys(plants).length === 0) {
    console.error("Migration failed: plants is empty or not an object"); return;
  }
  if(!Array.isArray(activities)) { console.error("Migration failed: activities is not an array"); return; }
  if(!Array.isArray(plans))      { console.error("Migration failed: plans is not an array"); return; }

  localStorage.setItem("vocnjak_v4", JSON.stringify({ plants, activities, plans }));
  console.log("Migration complete — plants:", Object.keys(plants).length, "activities:", activities.length, "plans:", plans.length);
}

  migrateSecureKeys().then(() => initUI());
})();

// ── OVERVIEW v4 HELPERS ──
function _loadV4() {
  try {
    const raw = localStorage.getItem("vocnjak_v4");
    if(!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function _generatePlansForPlant(plant) {
  if (!plant || typeof plant.type !== "string") return [];
  const type = plant.type;
  let sections = [];
  const standard = ["apple", "pear", "cherry", "nectarine", "peach", "apricot", "plum"];
  if (standard.indexOf(type) !== -1) {
    sections = ["shared", type];
  } else if (type === "olive") {
    sections = ["olive"];
  } else if (type === "fig") {
    sections = ["fig"];
  } else if (type === "citrus") {
    const v = plant.variety;
    if (v === "lemon") sections = ["citrus_lemon"];
    else if (v === "orange") sections = ["citrus_orange"];
    else if (v === "mandarin") sections = ["citrus_mandarin"];
    else return [];
  } else {
    return [];
  }
  const result = [];
  for (const section of sections) {
    const entries = ORCHARD_PLAN_TEMPLATES[section] || [];
    for (const e of entries) {
      result.push({
        id: "gen:plant:" + plant.id + ":" + section + ":" + e.key,
        title: e.title,
        activityType: e.activityType,
        appliesToAll: false,
        plantIds: [plant.id],
        monthStart: e.monthStart,
        dayStart: e.dayStart,
        monthEnd: e.monthEnd,
        dayEnd: e.dayEnd,
        skipYear: 0,
        notes: e.notes
      });
    }
  }
  return result;
}

function backfillGeneratedPlans() {
  if (!confirm("Generirati nedostajuće planove za sve biljke? Postojeći planovi neće biti promijenjeni.")) return;
  const v4 = _loadV4();
  if (!v4 || typeof v4.plants !== "object") { showToast("Podaci nisu dostupni"); return; }
  if (!Array.isArray(v4.plans)) v4.plans = [];
  let added = 0;
  for (const plant of Object.values(v4.plants)) {
    const generated = _generatePlansForPlant(plant);
    for (const gp of generated) {
      if (!v4.plans.some(p => p && p.id === gp.id)) {
        v4.plans.push(gp);
        added++;
      }
    }
  }
  try {
    localStorage.setItem("vocnjak_v4", JSON.stringify(v4));
  } catch(e) { showToast("Greška pri spremanju"); return; }
  showToast(added > 0 ? "Dodano " + added + " planova." : "Nema novih planova");
  showScreen("plants");
}

function _v4PlansThisMonth(plans) {
  const month = new Date().getMonth() + 1; // 1-based
  return plans.filter(pl => {
    const start = pl.monthStart;
    const end   = pl.monthEnd || pl.monthStart;
    return month >= start && month <= end;
  }).length;
}

function _v4ActivitiesThisWeek(activities) {
  const now   = new Date();
  const day   = now.getDay(); // 0=Sun
  const diff  = (day === 0 ? -6 : 1 - day); // shift to Monday
  const mon   = new Date(now); mon.setDate(now.getDate() + diff); mon.setHours(0,0,0,0);
  const sun   = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
  return activities.filter(a => {
    if(!a.date) return false;
    const d = new Date(a.date);
    return d >= mon && d <= sun;
  }).length;
}

function _getPlanWindow(plan, year) {
  const start = new Date(year, plan.monthStart - 1, plan.dayStart || 1);
  const endMonth = plan.monthEnd || plan.monthStart;
  const endDay = plan.dayEnd || new Date(year, endMonth, 0).getDate();
  const end = new Date(year, endMonth - 1, endDay, 23, 59, 59);
  return { start, end };
}

function _v4DashboardPlans(v4) {
  const now = new Date();
  const year = now.getFullYear();
  const { plans = [], activities = [] } = v4;
  return plans.map(pl => {
    if(pl.skipYear === year) return null;
    const { start: wStart, end: wEnd } = _getPlanWindow(pl, year);
    // Tolerance ±7 days for matching (DOMAIN_RULES 5.6)
    const effectiveStart = new Date(wStart); effectiveStart.setDate(effectiveStart.getDate() - 7);
    const effectiveEnd = new Date(wEnd); effectiveEnd.setDate(effectiveEnd.getDate() + 7);
    // Check matching activity FIRST — done overrides all (DOMAIN_RULES 5.4)
    const pType = (pl.activityType || "").toLowerCase().trim();
    const hasMatch = activities.some(a => {
      if(!a.date) return false;
      const aType = (a.type || "").toLowerCase().trim();
      if(aType !== pType) return false;
      const ad = new Date(a.date);
      if(isNaN(ad.getTime())) return false;
      if(ad < effectiveStart || ad > effectiveEnd) return false;
      if(pl.appliesToAll) return true;
      return (a.plantIds || []).some(pid => (pl.plantIds || []).includes(pid));
    });
    let state;
    if(hasMatch) {
      state = "done";
    } else if(now < wStart) {
      state = "upcoming";
    } else if(now <= wEnd) {
      state = "active";
    } else {
      state = "missed";
    }
    return { title: pl.title || "", activityType: pl.activityType || "", state };
  }).filter(Boolean);
}

function _v4HasYoungTree(plants) {
  const cutoff = new Date();
  cutoff.setFullYear(cutoff.getFullYear() - 1);
  return Object.values(plants).some(p => {
    if(p.status === "forming") return true;
    if(p.plantedDate) {
      const d = new Date(p.plantedDate);
      if(!isNaN(d.getTime()) && d >= cutoff) return true;
    }
    return false;
  });
}

function _v4TypeLabel(type) {
  const map = { spraying:"Prskanje", pruning:"Rezidba", fertilizing:"Gnojidba", watering:"Navodnjavanje", planting:"Sadnja", harvest:"Berba", observation:"Opservacija", problem:"Problem", monitoring:"Monitoring" };
  return map[type] || type;
}

function _monitoringLabel(notes) {
  const map = {
    "monitoring:aphids_none":"Lisne uši: nema",
    "monitoring:aphids_low":"Lisne uši: malo (1–2)",
    "monitoring:aphids_medium":"Lisne uši: srednje (3–10)",
    "monitoring:aphids_high":"Lisne uši: puno (10+)",
    "monitoring:trap_0":"Feromonska zamka: 0",
    "monitoring:trap_1_5":"Feromonska zamka: 1–5",
    "monitoring:trap_6_20":"Feromonska zamka: 6–20",
    "monitoring:trap_20_plus":"Feromonska zamka: 20+",
    "monitoring:fungus_none":"Gljivice: nema",
    "monitoring:fungus_single_leaf":"Gljivice: jedan list",
    "monitoring:fungus_multiple_leaves":"Gljivice: više listova",
    "monitoring:unknown":"Monitoring: nisam siguran"
  };
  return map[notes] || notes;
}

// ── TRIGGER ENGINE (V2) ──
function getRecommendationsV2(v4, plantId, currentDateStr) {
  const { plants = {}, activities = [], plans = [] } = v4;
  if(!plants[plantId]) return [];

  // Consistent day-level basis — local YYYY-MM-DD
  if(!currentDateStr || !/^\d{4}-\d{2}-\d{2}$/.test(currentDateStr)) {
    const n = new Date();
    currentDateStr = n.getFullYear() + "-" + String(n.getMonth() + 1).padStart(2, "0") + "-" + String(n.getDate()).padStart(2, "0");
  }
  const [curY, curM, curD] = currentDateStr.split("-").map(Number);

  const plantActivities = activities
    .filter(a => Array.isArray(a.plantIds) && a.plantIds.includes(plantId))
    .sort((a, b) => (b.date || "").localeCompare(a.date || ""));

  function daysAgo(dateStr, n) {
    if(!dateStr || !/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return false;
    const [y, m, d] = dateStr.split("-").map(Number);
    const actDate = new Date(Date.UTC(y, m - 1, d));
    const refDate = new Date(Date.UTC(curY, curM - 1, curD));
    const diff = (refDate - actDate) / (1000 * 60 * 60 * 24);
    return diff >= 0 && diff <= n;
  }

  const lastMonitoring = plantActivities.find(a => a.type === "monitoring");
  const lastSpraying = plantActivities.find(a => a.type === "spraying");
  const hasRecentSpraying5 = lastSpraying && daysAgo(lastSpraying.date, 5);
  const hasRecentSpraying7 = lastSpraying && daysAgo(lastSpraying.date, 7);
  const hasRecentMonitoring14 = lastMonitoring && daysAgo(lastMonitoring.date, 14);
  const monNotes = lastMonitoring?.notes || "";

  const recs = [];

  // Rule A1 — aphids low
  if(monNotes === "monitoring:aphids_low" && !hasRecentSpraying5) {
    recs.push({ kind:"pest", urgency:"medium", actionCategory:"inspect", confidence:"moderate", message:"Niska prisutnost lisnih uši — prati stanje i ponovi pregled.", productHintLevel:"none" });
  }

  // Rule A2 — aphids medium/high
  if((monNotes === "monitoring:aphids_medium" || monNotes === "monitoring:aphids_high") && !hasRecentSpraying5) {
    recs.push({ kind:"pest", urgency:"high", actionCategory:"insecticide", confidence:"moderate", message:"Značajna prisutnost lisnih uši — razmotri tretman ako se ponavlja.", productHintLevel:"category" });
  }

  // Rule T1 — trap warning
  if(monNotes === "monitoring:trap_6_20") {
    recs.push({ kind:"monitoring", urgency:"medium", actionCategory:"inspect", confidence:"moderate", message:"Povećan broj ulova — pregledaj biljku.", productHintLevel:"none" });
  }

  // Rule T2 — trap action
  if(monNotes === "monitoring:trap_20_plus") {
    recs.push({ kind:"pest", urgency:"high", actionCategory:"insecticide", confidence:"moderate", message:"Visok broj ulova — moguća pojava štetnika.", productHintLevel:"category" });
  }

  // Rule F1 — fungus single leaf
  if(monNotes === "monitoring:fungus_single_leaf" && !hasRecentSpraying7) {
    recs.push({ kind:"disease", urgency:"medium", actionCategory:"inspect", confidence:"moderate", message:"Mogući početak bolesti — prati stanje.", productHintLevel:"none" });
  }

  // Rule F2 — fungus multiple leaves
  if(monNotes === "monitoring:fungus_multiple_leaves" && !hasRecentSpraying7) {
    recs.push({ kind:"disease", urgency:"high", actionCategory:"fungicide", confidence:"moderate", message:"Širenje simptoma — razmotri zaštitu.", productHintLevel:"category" });
  }

  // Rule M1 — no recent monitoring (Apr–Sep only)
  if(!hasRecentMonitoring14) {
    if(curM >= 4 && curM <= 9) {
      recs.push({ kind:"monitoring", urgency:"medium", actionCategory:"inspect", confidence:"moderate", message:"Nema nedavnog pregleda — provjeri stanje biljke.", productHintLevel:"none" });
    }
  }

  // Rule P1 — active plan
  const hasActivePlan = plans.some(pl => {
    if(pl.skipYear === curY) return false;
    if(!pl.appliesToAll && !(pl.plantIds || []).includes(plantId)) return false;
    const { start: wStart, end: wEnd } = _getPlanWindow(pl, curY);
    const curDate = new Date(curY, curM - 1, curD, 12, 0, 0);
    return curDate >= wStart && curDate <= wEnd;
  });
  if(hasActivePlan) {
    recs.push({ kind:"plan", urgency:"low", actionCategory:"monitoring", confidence:"moderate", message:"Aktivan plan rada za ovu biljku.", productHintLevel:"none" });
  }

  // Dedupe by kind + actionCategory + message
  const seen = new Set();
  const unique = recs.filter(r => {
    const key = r.kind + "|" + r.actionCategory + "|" + r.message;
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  // Sort by urgency: high → medium → low, limit to 3
  const urgencyOrder = { high: 0, medium: 1, low: 2 };
  unique.sort((a, b) => (urgencyOrder[a.urgency] ?? 3) - (urgencyOrder[b.urgency] ?? 3));
  return unique.slice(0, 3);
}

// ── RECOMMENDATION ENGINE V1 (plan + activity + plant status) ──
function getRecommendationsV1(v4, plantId) {
  const recs = [];
  const plant = (v4.plants || {})[plantId];
  if(!plant) return recs;
  const now = new Date();
  const year = now.getFullYear();
  const cm = now.getMonth() + 1;

  // Rule 1 — single aggregated active-plan prompt
  let activePlanPushed = false;
  const plans = v4.plans || [];
  for(let i = 0; i < plans.length && !activePlanPushed; i++) {
    const pl = plans[i];
    if(pl.skipYear === year) continue;
    if(!pl.appliesToAll && !(pl.plantIds || []).includes(plantId)) continue;
    const { start: wStart, end: wEnd } = _getPlanWindow(pl, year);
    if(now < wStart || now > wEnd) continue;
    const effStart = new Date(wStart); effStart.setDate(effStart.getDate() - 7);
    const effEnd   = new Date(wEnd);   effEnd.setDate(effEnd.getDate() + 7);
    const pType = (pl.activityType || "").toLowerCase().trim();
    const hasMatch = (v4.activities || []).some(a => {
      if(!a.date) return false;
      if((a.type || "").toLowerCase().trim() !== pType) return false;
      const ad = new Date(a.date);
      if(isNaN(ad.getTime())) return false;
      if(ad < effStart || ad > effEnd) return false;
      if(pl.appliesToAll) return true;
      return (a.plantIds || []).some(pid => (pl.plantIds || []).includes(pid));
    });
    if(!hasMatch) {
      recs.push({ urgency: "medium", actionCategory: "inspect", message: "Plan je aktivan — potrebno izvršiti" });
      activePlanPushed = true;
    }
  }

  // Rule 2 — young plant notice (informational)
  const pd = plant.plantedDate ? new Date(plant.plantedDate) : null;
  const cutoffY = new Date(); cutoffY.setFullYear(cutoffY.getFullYear() - 1);
  const isYoung = plant.status === "forming" || (pd !== null && !isNaN(pd.getTime()) && pd >= cutoffY);
  if(isYoung) {
    recs.push({ urgency: "low", actionCategory: "monitoring", message: "Biljka je mlada — fokus na razvoj, ne na rod" });
  }

  // Rule 3 — watering gap (months 4–9, 14-day threshold)
  if(cm >= 4 && cm <= 9) {
    const cutoffW = new Date(); cutoffW.setDate(cutoffW.getDate() - 14);
    const hasRecentWater = (v4.activities || []).some(a => {
      if(!a.date) return false;
      if((a.type || "").toLowerCase().trim() !== "watering") return false;
      const ad = new Date(a.date);
      if(isNaN(ad.getTime())) return false;
      if(ad < cutoffW) return false;
      return (a.plantIds || []).includes(plantId);
    });
    if(!hasRecentWater) {
      recs.push({ urgency: "medium", actionCategory: "inspect", message: "Provjeri zalijevanje" });
    }
  }

  return recs;
}

function _renderRecCard(r) {
  const urgencyLabel = { high:"Visoko", medium:"Srednje", low:"Nisko" };
  const urgencyColor = { high:"#dc2626", medium:"#b45309", low:"var(--text-light)" };
  const actionLabel = { inspect:"Pregledaj", insecticide:"Razmotri zaštitu", fungicide:"Razmotri fungicid", monitoring:"Prati", wait:"Pričekaj" };
  const disclaimer = r.productHintLevel === "category" ? '<div style="font-size:11px;color:var(--text-light);margin-top:4px">Provjeri stadij biljke i lokalnu registraciju prije primjene.</div>' : "";
  return `<div class="card" style="padding:10px 14px;margin-bottom:6px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span style="font-size:11px;font-weight:600;color:${urgencyColor[r.urgency] || "var(--text-light)"}">${urgencyLabel[r.urgency] || r.urgency}</span>
      <span style="font-size:11px;color:var(--text-mid)">${actionLabel[r.actionCategory] || r.actionCategory}</span>
    </div>
    <div style="font-size:13px">${r.message}</div>
    ${disclaimer}
  </div>`;
}

function _renderOverviewV4(mc, v4) {
  const { plants = {}, activities = [] } = v4;
  const monthNames = ["Siječanj","Veljača","Ožujak","Travanj","Svibanj","Lipanj","Srpanj","Kolovoz","Rujan","Listopad","Studeni","Prosinac"];
  const now = new Date();

  const dashPlans = _v4DashboardPlans(v4);
  const activePlans = dashPlans.filter(p => p.state === "active");

  const recent = activities.slice().sort((a, b) => {
    const da = new Date(a.date || 0), db = new Date(b.date || 0);
    return db - da;
  }).slice(0, 3);

  const youngTree = _v4HasYoungTree(plants);

  const plantIds = Object.keys(plants);
  const seen = new Set();
  const overviewRecs = [];
  for(const pid of plantIds) {
    if(overviewRecs.length >= 3) break;
    const recs = getRecommendationsV2(v4, pid);
    for(const r of recs) {
      if(overviewRecs.length >= 3) break;
      if(seen.has(r.message)) continue;
      seen.add(r.message);
      overviewRecs.push(r);
    }
  }
  const overviewRecsHTML = overviewRecs.length > 0
    ? '<div class="section-label" style="margin-top:16px">Što sada provjeriti</div>' + overviewRecs.map(r => _renderRecCard(r)).join("")
    : "";

  // Session 16 — weather visibility: ONLY when an active spraying plan exists
  const hasActiveSprayingPlan = dashPlans.some(p => p.activityType === "spraying" && p.state === "active");
  const showWeather = hasActiveSprayingPlan
    && weatherData
    && Array.isArray(weatherData.time)
    && weatherData.time.length >= 3
    && Array.isArray(weatherData.temperature_2m_min)
    && Array.isArray(weatherData.temperature_2m_max)
    && Array.isArray(weatherData.precipitation_sum);
  let weatherHTML = "";
  if(showWeather) {
    const dn = ["Danas","Sutra","Prekosutra"];
    weatherHTML = `<div class="weather-card" style="margin-top:16px">
      <div style="font-size:10px;font-weight:600;color:var(--text-light);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px">Zagreb — prognoza</div>
      <div class="weather-row">
        ${[0,1,2].map((i,idx) => `
          ${idx > 0 ? '<div class="weather-divider"></div>' : ''}
          <div class="weather-day">
            <div class="weather-day-label">${dn[i]}</div>
            <div class="weather-temp">${Math.round(weatherData.temperature_2m_min[i])}° / ${Math.round(weatherData.temperature_2m_max[i])}°</div>
            <div class="weather-rain">${weatherData.precipitation_sum[i] > 0 ? '🌧 ' + weatherData.precipitation_sum[i].toFixed(1) + 'mm' : '☀️ suho'}</div>
          </div>
        `).join("")}
      </div>
    </div>`;
  }

  mc.innerHTML = `
    <div class="section-label">${monthNames[now.getMonth()]} ${now.getFullYear()}</div>
    ${overviewRecsHTML}
    ${weatherHTML}
    <div class="section-label" style="margin-top:16px">Plan rada</div>
    ${activePlans.length === 0
      ? '<div class="empty">Nema aktivnih planova.</div>'
      : activePlans.slice(0, 2).map(p => `<div class="card" style="padding:12px 14px;margin-bottom:8px">
          <div style="font-size:14px;font-weight:600;color:var(--green-deep)">${p.title}</div>
          <div style="font-size:12px;color:var(--text-mid);margin-top:2px">${_v4TypeLabel(p.activityType)}</div>
        </div>`).join("")}
    <div class="section-label" style="margin-top:16px">Zadnje aktivnosti</div>
    ${recent.length === 0
      ? '<div class="empty">Nema zabilježenih aktivnosti.</div>'
      : recent.map(a => {
          const dt = a.date ? new Date(a.date) : null;
          const dateStr = dt ? `${dt.getDate()}.${dt.getMonth()+1}.` : "";
          const pCount = (a.plantIds || []).length;
          const plantLabel = pCount === 0 ? "Sve biljke" : pCount === 1 ? (v4.plants[(a.plantIds||[])[0]]?.name || "1 biljka") : pCount + " biljki";
          return `<div class="card" style="padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-size:13px;font-weight:500">${_v4TypeLabel(a.type)}</div>
              <div style="font-size:11px;color:var(--text-light)">${plantLabel}</div>
            </div>
            <div style="font-size:11px;color:var(--text-light)">${dateStr}</div>

function _renderOverviewLegacy(mc) {

      </div>
    </div>
  `).join("");

  let weatherHTML = "";
  if(weatherData) {
    const dn = ["Danas","Sutra","Prekosutra"];
    const rainToday = weatherData.precipitation_sum[0];
    const rainTomorrow = weatherData.precipitation_sum[1];

    const sprayKeywords = ["prskanje","ulje","bakar","cuprablau","score","mospilan"];
    const hasSprayTodos = PLANTS.some(p => (data[p.id]?.todos||[]).some(t => {
      const txt = todoText(t).toLowerCase();
      const isSpray = sprayKeywords.some(k => txt.includes(k));
      if(!isSpray) return false;
      if(typeof t === "string" || !t.monthStart) return false;
      return isTodoInWindow(t, 14);
    }));

    let dryWindowHTML = "";
    if(hasSprayTodos) {
      const precip = weatherData.precipitation_sum;
      const dates = weatherData.time;
      let dryStart = -1, dryEnd = -1;
      for(let i = 0; i < precip.length; i++) {
        if(precip[i] < 1) {
          if(dryStart === -1) dryStart = i;
          dryEnd = i;
          if(dryEnd - dryStart >= 1) break;
        } else { dryStart = -1; dryEnd = -1; }
      }
      if(dryStart !== -1 && dryEnd - dryStart >= 1) {
        const fmt = d => new Date(d).toLocaleDateString("hr-HR", { weekday:"short", day:"numeric", month:"short" });
        dryWindowHTML = `<div style="background:#d1fae5;border:1px solid #6ee7b7;border-radius:var(--r-sm);padding:8px 12px;margin-top:10px;font-size:12px;color:#065f46;line-height:1.4">✅ Suhi prozor za prskanje: ${fmt(dates[dryStart])} – ${fmt(dates[dryEnd])}</div>`;
      } else {
        dryWindowHTML = `<div class="weather-warn" style="margin-top:10px">⚠️ Nema suhog prozora u sljedećih 7 dana — prati prognozu</div>`;
      }
    }

    const warnRain = hasSprayTodos && (rainToday > 1 || rainTomorrow > 1);

    weatherHTML = `<div class="weather-card">
      <div style="font-size:10px;font-weight:600;color:var(--text-light);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px">Zagreb — prognoza</div>
      <div class="weather-row">
        ${[0,1,2].map((i,idx) => `
          ${idx > 0 ? '<div class="weather-divider"></div>' : ''}
          <div class="weather-day">
            <div class="weather-day-label">${dn[i]}</div>
            <div class="weather-temp">${Math.round(weatherData.temperature_2m_min[i])}° / ${Math.round(weatherData.temperature_2m_max[i])}°</div>
            <div class="weather-rain">${weatherData.precipitation_sum[i] > 0 ? '🌧 ' + weatherData.precipitation_sum[i].toFixed(1) + 'mm' : '☀️ suho'}</div>
          </div>
        `).join("")}
      </div>
      ${warnRain ? `<div class="weather-warn">⚠️ Ne prskaj ${rainToday > 1 ? 'danas' : 'sutra'} — očekuje se kiša (${rainToday > 1 ? rainToday.toFixed(1) : rainTomorrow.toFixed(1)}mm)</div>` : ''}
      ${dryWindowHTML}
    </div>`;
  }

  mc.innerHTML = `
    ${weatherHTML}
    ${alertsHTML}

    <div class="overview-stats">
      <div class="stat-card clickable" onclick="showDetailView('todos')">
        <div class="stat-num">${allTodos}</div>
        <div class="stat-label">Otvoreni zadaci</div>
        <div class="stat-arrow">Pogledaj sve →</div>
      </div>
      <div class="stat-card clickable" onclick="showDetailView('month')">
        <div class="stat-num">${monthTasks}</div>
        <div class="stat-label">Ovaj mjesec</div>
        <div class="stat-arrow">Raspored →</div>
      </div>
      <div class="stat-card clickable" onclick="showDetailView('hitno')">
        <div class="stat-num ${hitnoPlants > 0 ? 'red' : ''}">${hitnoPlants}</div>
        <div class="stat-label">Hitno</div>
        <div class="stat-arrow">${hitnoPlants > 0 ? 'Pogledaj →' : 'Sve uredno'}</div>
      </div>
      <div class="stat-card clickable" onclick="showScreen('plants')">
        <div class="stat-num">${totalPlants}</div>
        <div class="stat-label">Biljke</div>
        <div class="stat-arrow">Pogledaj sve →</div>
      </div>
    </div>

    <div class="section-label">Stanje biljki</div>
    ${PLANTS.map(p => {
      if(!data[p.id]) return "";
      const st = data[p.id].entries[0]?.status || "dobro";
      const sc = STATUS_COLORS[st];
      const tc = data[p.id].todos.length;
      return `<div class="plant-card" onclick="showScreen('plants'); setActivePlant('${p.id}')">
        <div class="plant-card-accent" style="background:${sc.stripe}"></div>
        <div class="plant-card-body">
          <div class="plant-card-top">
            <div class="plant-card-name">${p.emoji} ${p.name}</div>
            <div class="status-badge ${sc.cls}"><span class="status-dot"></span>${STATUS_LABELS[st]}</div>
          </div>
          <div class="plant-card-sub">${p.subtitle}</div>
          ${tc > 0 ? `<div class="plant-card-todos">📋 ${tc} zadatak${tc > 1 ? 'a' : ''}</div>` : ""}

}

// ── ALERTS ──
function getActiveAlerts() {
  const now = new Date();
  const m = now.getMonth();
  const d = now.getDate();
  const alerts = [];

  // Soft reminder for 2nd copper only if wet spring (May)
  if(m === 4 && !dismissedAlerts.includes("bakar2_svibanj")) alerts.push({ id:"bakar2_svibanj", title:"Kišovito proljeće?", body:"Ako je travanj/svibanj bio vlažan, preporučuje se 2. tretman bakrom za nektarinu (razmak 7–10 dana od prvog). Provjeri prognozu.", screen:"plants", actionLabel:"Idi na nektarinu" });

  // Seasonal
  if(m === 2 && d < 15 && !dismissedAlerts.includes("rezidba_ozujak")) alerts.push({ id:"rezidba_ozujak", title:"Sezona rezidbe", body:"Ožujak – idealno vrijeme za rezidbu svih voćki. Koristiti Lac Balsam na većim rezovima.", screen:"plants", actionLabel:"Idi na biljke" });
  if(m === 3 && d >= 20 && !dismissedAlerts.includes("klopke_travanj")) alerts.push({ id:"klopke_travanj", title:"Postavi klopke i ploče", body:"Kraj travnja: feromonske klopke za jabuku i šljivu, žute ljepljive ploče za trešnju.", screen:"calendar", actionLabel:"Pogledaj kalendar" });
  if(m === 4 && !dismissedAlerts.includes("score_svibanj")) alerts.push({ id:"score_svibanj", title:"Score + Mospilan na rasporedu", body:"Svibanj: Score 250 EC + Mospilan 20 SP za jabuku i šljivu nakon cvatnje. Ne prskati za cvjetanja!", screen:"calendar", actionLabel:"Pogledaj kalendar" });

  return alerts.filter(a => !dismissedAlerts.includes(a.id));
}

function dismissAlert(id) {
  dismissedAlerts.push(id);
  try { localStorage.setItem(KEY + "_alerts", JSON.stringify(dismissedAlerts)); } catch(e) {}
  const el = document.getElementById("alert-" + id);
  if(el) { el.style.opacity = "0"; el.style.transform = "scale(0.97)"; el.style.transition = "all 0.2s"; setTimeout(() => el.remove(), 200); }
}

function completeTodoGlobal(plantId, idx) {
  const todo = data[plantId].todos[idx];
  const text = todoText(todo);
  data[plantId].todos.splice(idx, 1);
  const today = new Date().toISOString().split("T")[0];
  const maxId = data[plantId].entries.reduce((m,e) => Math.max(m,e.id), 0);
  data[plantId].entries.unshift({ id: maxId+1, date: today, type: "odrađeno", note: text, status: "odradjeno" });
  saveData();
  syncIcalOnComplete(text);
  showDetailView("todos");
}

function toggleTodoForm() {
  addTodoFormVisible = !addTodoFormVisible;
  const area = document.getElementById("todoFormArea");
  if(!area) return;
  if(addTodoFormVisible) {
    area.innerHTML = `<div class="form-card" style="margin-bottom:10px"><div style="display:flex;gap:8px">
      <input id="todoInput" class="form-input" placeholder="Novi zadatak..." style="flex:1" onkeydown="if(event.key==='Enter')saveTodo()">
      <button onclick="saveTodo()" class="btn-primary" style="flex:0;padding:9px 16px">OK</button>
      <button onclick="toggleTodoForm()" class="btn-secondary" style="padding:9px 12px">✕</button>
    </div></div>`;
    document.getElementById("todoInput")?.focus();
  } else { area.innerHTML = ""; }
}

function saveTodo() {
  const val = document.getElementById("todoInput")?.value?.trim();
  if(!val) return;
  data[activePlantId].todos.push(val);
  saveData(); addTodoFormVisible = false; renderPlantScreen();
}

function completeTodo(idx) {
  const todo = data[activePlantId].todos[idx];
  const text = todoText(todo);
  data[activePlantId].todos.splice(idx, 1);
  const today = new Date().toISOString().split("T")[0];
  const maxId = data[activePlantId].entries.reduce((m,e) => Math.max(m,e.id), 0);
  data[activePlantId].entries.unshift({ id: maxId+1, date: today, type: "odrađeno", note: text, status: "odradjeno" });
  saveData();
  syncIcalOnComplete(text);
  renderPlantScreen();
}

function removeTodo(idx) {
  data[activePlantId].todos.splice(idx, 1);
  saveData(); renderPlantScreen();
}

function toggleEntryForm() {
  addFormVisible = !addFormVisible;

function saveEntry() {

  const maxId = data[activePlantId].entries.reduce((m,e) => Math.max(m,e.id), 0);
  data[activePlantId].entries.unshift({ id: maxId+1, date: document.getElementById("eDate").value, type: document.getElementById("eType").value, note, status: document.getElementById("eStatus").value });

function removeEntry(id) {

}

function saveNewActivityV4() {
  const ALLOWED_TYPES = ["spraying","pruning","fertilizing","watering","planting","harvest","observation","problem","monitoring"];
  const MONITORING_VALUES = ["monitoring:aphids_none","monitoring:aphids_low","monitoring:aphids_medium","monitoring:aphids_high","monitoring:trap_0","monitoring:trap_1_5","monitoring:trap_6_20","monitoring:trap_20_plus","monitoring:fungus_none","monitoring:fungus_single_leaf","monitoring:fungus_multiple_leaves","monitoring:unknown"];
  const type = document.getElementById("v4Type")?.value;
  const date = document.getElementById("v4Date")?.value;
  const plantIds = [...document.querySelectorAll(".v4-plant-check:checked")].map(cb => cb.value);

  // 1. validate type
  if(!type || !ALLOWED_TYPES.includes(type)) { showToast("Odaberi tip aktivnosti"); return; }

  // 2. validate monitoring selection
  let product = "";
  let notes = "";
  if(type === "monitoring") {
    const selected = document.querySelector('input[name="v4Monitoring"]:checked');
    if(!selected || !MONITORING_VALUES.includes(selected.value)) { showToast("Odaberi opažanje"); return; }
    notes = selected.value;
  } else {
    product = document.getElementById("v4Product")?.value?.trim() || "";
    notes = document.getElementById("v4Notes")?.value?.trim() || "";
  }

  // 3. validate date
  if(!date || !/^\d{4}-\d{2}-\d{2}$/.test(date)) { showToast("Upiši ispravan datum"); return; }
  const [yr, mo, dy] = date.split("-").map(Number);
  const checkDate = new Date(Date.UTC(yr, mo - 1, dy));
  if(checkDate.getUTCFullYear() !== yr || checkDate.getUTCMonth() !== mo - 1 || checkDate.getUTCDate() !== dy) { showToast("Upiši ispravan datum"); return; }

  // 4. validate plantIds
  if(!Array.isArray(plantIds) || plantIds.length === 0) { showToast("Odaberi barem jednu biljku"); return; }

  // 5. load v4 and validate plantIds exist
  let v4;
  try {
    const raw = localStorage.getItem("vocnjak_v4");
    v4 = raw ? JSON.parse(raw) : null;
    if(!v4 || typeof v4.plants !== "object" || Array.isArray(v4.plants) || !Array.isArray(v4.activities)) {
      showToast("Podaci nisu dostupni"); return;
    }
  } catch(e) { showToast("Greška pri čitanju podataka"); return; }

  const invalidPlant = plantIds.find(pid => !v4.plants[pid]);
  if(invalidPlant) { showToast("Odabrana biljka ne postoji"); return; }

  // 6. all valid — create and save
  const activity = {
    id: "act_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7),
    type,
    date,
    status: "done",
    plantIds,
    product,
    notes
  };
  v4.activities.push(activity);
  try {
    localStorage.setItem("vocnjak_v4", JSON.stringify(v4));
  } catch(e) { showToast("Greška pri spremanju"); return; }
  showToast("Spremljeno ✓");
  showScreen("overview");
}

function _activityPlantLabel(plantIds, plants) {
  const names = (plantIds || []).map(pid => plants[pid]?.name || "—");
  if(names.length === 0) return "—";
  if(names.length <= 2) return names.join(", ");
  return names.length + " biljki";
}

// ── DELETE PLANT (v4 — Session 17.5: deterministic atomic cascade) ──
function deletePlant(plantId) {
  let v4;
  try {
    const raw = localStorage.getItem("vocnjak_v4");
    v4 = raw ? JSON.parse(raw) : null;
    if(!v4 || typeof v4.plants !== "object" || !v4.plants[plantId]) {
      showToast("Biljka nije pronađena"); return;
    }
  } catch(e) { showToast("Greška pri čitanju podataka"); return; }
  if(!Array.isArray(v4.plans)) v4.plans = [];
  if(!Array.isArray(v4.activities)) v4.activities = [];
  const plantName = (v4.plants[plantId].name || "").trim() || plantId;
  // Read-only cascade-impact counts (plans/activities that belong ONLY to this plant)
  const plansDropped = v4.plans.filter(pl =>
    pl && pl.appliesToAll !== true &&
    Array.isArray(pl.plantIds) && pl.plantIds.length === 1 && pl.plantIds[0] === plantId
  ).length;
  const activitiesDropped = v4.activities.filter(a =>
    a && Array.isArray(a.plantIds) && a.plantIds.length === 1 && a.plantIds[0] === plantId
  ).length;
  if(!confirm("Obriši biljku '" + plantName + "'? Uklonit će se i " + plansDropped + " plana(e) i " + activitiesDropped + " aktivnost(i) koje pripadaju samo ovoj biljci.")) return;
  // Cascade (in-memory on single v4 reference)
  delete v4.plants[plantId];
  v4.plans = v4.plans.filter(pl => {
    if(!pl) return false;
    if(pl.appliesToAll === true) return true;
    // Session 17.5 fix: malformed plans (no valid plantIds array) are KEPT untouched —
    // this delete flow must not silently destroy unrelated/corrupt plan data.
    if(!Array.isArray(pl.plantIds)) return true;
    pl.plantIds = pl.plantIds.filter(pid => pid !== plantId);
    return pl.plantIds.length > 0;
  });
  v4.activities = v4.activities.filter(a => {
    if(!a) return false;
    if(!Array.isArray(a.plantIds)) return false;
    a.plantIds = a.plantIds.filter(pid => pid !== plantId);
    return a.plantIds.length > 0;
  });
  try {
    localStorage.setItem("vocnjak_v4", JSON.stringify(v4));
  } catch(e) { showToast("Greška pri spremanju"); return; }
  const remaining = Object.keys(v4.plants);
  activePlantId = remaining.length > 0 ? remaining[0] : "";
  showToast("Obrisano ✓");
  showScreen("plants");
}
